    :root {

      --bg2: #0D0E16;
      --surface: rgba(255,255,255,0.035);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);

      --cyan-dim: rgba(92,225,230,0.12);
      --cyan-glow: rgba(92,225,230,0.35);
      --amber: #F0A830;
      --amber-dim: rgba(240,168,48,0.12);
      --text: #E8EAED;
      --text2: rgba(232,234,237,0.55);
      --text3: rgba(232,234,237,0.28);

      --sans: 'Space Grotesk', sans-serif;
      --rad: 14px;
      --rad-sm: 9px;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

      background-size: 48px 48px;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad);
      backdrop-filter: blur(12px);
      transition: border-color 0.25s;
    }
    .card:hover { border-color: var(--border2); }

    /* Category cards */
    .cat-card {
      border: 1px solid var(--border);
      border-radius: var(--rad-sm);
      padding: 14px 16px;
      cursor: pointer;
      background: transparent;
      text-align: left;
      width: 100%;
      color: var(--text);
      font-family: var(--sans);
      transition: all 0.2s;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .cat-card:hover { border-color: var(--border2); background: var(--surface); }
    .cat-card.active {
      border-color: var(--cyan);
      background: var(--cyan-dim);
      box-shadow: 0 0 0 1px rgba(92,225,230,0.15), 0 4px 24px rgba(92,225,230,0.08);
    }
    .cat-card.active .cat-icon { color: var(--cyan); }
    .cat-icon { color: var(--text3); transition: color 0.2s; margin-top: 2px; flex-shrink: 0; }

    /* Chips */
    .chip {
      padding: 7px 14px; border: 1px solid var(--border);
      border-radius: 100px; background: transparent;
      color: var(--text2); font-family: var(--sans);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
    .chip.active { border-color: var(--cyan); background: var(--cyan-dim); color: var(--cyan); font-weight: 600; }
    .chip:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Inputs */
    .inp {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--rad-sm); padding: 11px 14px;
      color: var(--text); font-family: var(--sans); font-size: 15px;
      width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .inp:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(92,225,230,0.1); }
    select.inp { cursor: pointer; }
    select.inp option { background: #12141f; }

    /* Segmented */
    .seg { display: flex; border: 1px solid var(--border); border-radius: var(--rad-sm); overflow: hidden; background: var(--surface); }
    .seg-btn {
      flex: 1; padding: 9px 10px; border: none; background: transparent;
      color: var(--text2); font-family: var(--sans); font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.15s;
    }
    .seg-btn + .seg-btn { border-left: 1px solid var(--border); }
    .seg-btn:hover:not(:disabled) { color: var(--text); background: var(--surface2); }
    .seg-btn.active { background: var(--cyan); color: #000; font-weight: 700; }
    .seg-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Custom range slider */
    .slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }

      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--cyan); border: 2px solid var(--bg);
      box-shadow: 0 0 10px var(--cyan-glow), 0 0 0 1px var(--cyan);
      cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;

    .slider::-webkit-slider-thumb:hover { box-shadow: 0 0 20px var(--cyan-glow); transform: scale(1.15); }

      content: ''; position: absolute; top: -60%; left: -30%; width: 180%; height: 180%;

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }

    .hdr { position: sticky; top: 0; z-index: 50; background: rgba(8,9,14,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }

    /* Lang btn */
    .lang-btn { padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid transparent; cursor: pointer; background: transparent; font-family: var(--sans); transition: all 0.15s; }
    .lang-btn:hover { border-color: var(--border2); color: var(--text); }
    .lang-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }

    /* Icon helper */
    .ico { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .num-inp { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--rad-sm); padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 16px; width: 100%; outline: none; transition: border-color 0.2s, box-shadow 0.2s; text-align: right; }

    .bk-row + .bk-row { border-top: 1px solid var(--border); }

    textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--rad-sm); padding: 12px; color: var(--text); font-family: var(--mono); font-size: 12px; width: 100%; outline: none; resize: none; transition: border-color 0.2s; }
    textarea:focus { border-color: var(--cyan); }
    textarea::-webkit-scrollbar { width: 5px; }
    textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Btn */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--rad-sm); font-family: var(--sans); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }
    .btn-primary { background: var(--cyan); color: #000; border-color: var(--cyan); }
    .btn-primary:hover { background: rgba(92,225,230,0.85); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-danger { background: transparent; border-color: rgba(248,113,113,0.3); color: #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }

    @media (max-width: 768px) {
      .main-grid { flex-direction: column !important; }
      .right-col { position: static !important; }
    }
  </style>

  // ── MATH ───────────────────────────────────────────────────────────────
  function evalPoly(coef, x) { let y=0; for(const c of coef) y=y*x+c; return y; }
  function makeKey(kat, sys, aus, klem) { return kat==="Pitch" ? `Pitch|${sys}|—|—` : `Flat|${sys}|${aus}|${klem}`; }

  function richtpreisProKwp({ kategorie, system, ausrichtung, klemmung, schnee, wind, config, t }) {
    if(kategorie==="METAL"||kategorie==="GROUND") return { preis:null, status:"anfrage", meta:{ reason: t?.datenInAktualisierung||"Daten in Aktualisierung" } };
    const key=makeKey(kategorie,system,ausrichtung,klemmung);
    const m=config.models[key];
    if(!m) return { preis:null, status:"unbekannt", meta:{ key, reason:"—" } };
    if(m.wind_anfrage_threshold!=null && wind>=m.wind_anfrage_threshold) return { preis:null, status:"anfrage", meta:{ key, grund:`${t?.windlast||"Wind"} ≥ ${m.wind_anfrage_threshold} kN/m²` } };
    if(m.snow_anfrage_threshold!=null && schnee>=m.snow_anfrage_threshold) return { preis:null, status:"anfrage", meta:{ key, grund:`${t?.schneelast||"Schnee"} ≥ ${m.snow_anfrage_threshold} kN/m²` } };
    let preis;
    if(m.type==="constant") preis=m.value;
    else if(m.type==="poly_wind") preis=evalPoly(m.wind_coef,wind);
    else if(m.type==="separable_2d") preis=m.base+evalPoly(m.wind_coef,wind)+evalPoly(m.snow_coef,schnee);
    else return { preis:null, status:"unbekannt", meta:{ key } };
    let status="ok"; const ausserhalb=[];
    if(m.wind_range&&(wind<m.wind_range[0]||wind>m.wind_range[1])) ausserhalb.push(`${t?.windlast||"Wind"} ${wind.toFixed(1)} ∉ [${m.wind_range[0]}, ${m.wind_range[1]}]`);
    if(m.snow_range&&(schnee<m.snow_range[0]||schnee>m.snow_range[1])) ausserhalb.push(`${t?.schneelast||"Schnee"} ${schnee.toFixed(1)} ∉ [${m.snow_range[0]}, ${m.snow_range[1]}]`);
    if(ausserhalb.length) status="extrapoliert";
    return { preis:Math.round(preis*100)/100, status, meta:{ key, ausserhalb, model:m.type, m } };
  }

  function indexConfig(config) {
    const flat={}, pitch=[];
    for(const [key,m] of Object.entries(config.models)) {
      if(m.kategorie==="Flat") {
        if(!flat[m.system]) flat[m.system]={ system:m.system, variants:[] };
        flat[m.system].variants.push({ key, klemmung:m.klemmung, ausrichtung:m.ausrichtung });
      } else if(m.kategorie==="Pitch") pitch.push({ key, system:m.system });
    }
    for(const sys of Object.values(flat)) {
      sys.klemmungen=[...new Set(sys.variants.map(v=>v.klemmung))];
      sys.ausrichtungen=[...new Set(sys.variants.map(v=>v.ausrichtung))];
    }
    return { flat, pitch };
  }
  const clone = o => JSON.parse(JSON.stringify(o));

  // ── ANIMATED NUMBER ────────────────────────────────────────────────────
  function useAnimatedNumber(target, duration=350) {
    const [display, setDisplay] = useState(target);
    const animRef = useRef(null);
    const prevRef = useRef(target);
    useEffect(() => {
      const start=prevRef.current, end=target, t0=performance.now();
      if(animRef.current) cancelAnimationFrame(animRef.current);
      function step(now) {
        const p=Math.min((now-t0)/duration,1);
        const e=1-Math.pow(1-p,3);
        setDisplay(start+(end-start)*e);
        if(p<1) animRef.current=requestAnimationFrame(step);
        else prevRef.current=end;
      }
      animRef.current=requestAnimationFrame(step);
      return ()=>cancelAnimationFrame(animRef.current);
    }, [target]);
    return display;
  }

    const COLS=9, ROWS=5, TOTAL=COLS*ROWS;
    const W=38, H=26, GAP=4;
    const svgW=COLS*(W+GAP)-GAP+2, svgH=ROWS*(H+GAP)-GAP+2;
    const active=Math.round(Math.min(moduleCount/maxModules,1)*TOTAL);
    const [tick, setTick] = useState(0);
    useEffect(() => { const id=setInterval(()=>setTick(t=>t+1),1800); return ()=>clearInterval(id); }, []);

    return (
      <div style={{ position:'relative' }}>
        {/* Sun */}
        <div style={{ position:'absolute', top:-28, right:-8, display:'flex', alignItems:'center', gap:6 }}>

            <svg width="32" height="32" viewBox="0 0 32 32">
              <circle cx="16" cy="16" r="8" fill="var(--amber)" opacity="0.9"/>
              <g style={{ animation:'sunSpin 12s linear infinite', transformOrigin:'16px 16px' }}>
                {[0,45,90,135,180,225,270,315].map(a => {
                  const r=Math.PI*a/180;
                  const x1=16+11*Math.cos(r), y1=16+11*Math.sin(r);
                  const x2=16+14*Math.cos(r), y2=16+14*Math.sin(r);
                  return <line key={a} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--amber)" strokeWidth="1.5" strokeLinecap="round" opacity="0.7"/>;
                })}
              </g>
              <circle cx="16" cy="16" r="11" fill="none" stroke="var(--amber)" strokeWidth="0.5" opacity="0.3"/>
            </svg>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:18, fontWeight:600, color:'var(--amber)', lineHeight:1 }}>
              {kwp.toFixed(1)}
            </div>
            <div style={{ fontSize:9, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.1em' }}>kWp</div>
          </div>
        </div>

        <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`} style={{ display:'block', marginTop:16 }}>
          <defs>
            <filter id="panelGlow">
              <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#5CE1E6" stopOpacity="0.9"/>
              <stop offset="100%" stopColor="#3BC8CD" stopOpacity="0.75"/>
            </linearGradient>
          </defs>

          {Array.from({length:TOTAL}).map((_,i) => {
            const col=i%COLS, row=Math.floor(i/COLS);
            const x=col*(W+GAP)+1, y=row*(H+GAP)+1;
            const isActive=i<active;
            const delayS=((i*0.07)%2).toFixed(2);
            return (
              <g key={i}>
                <rect x={x} y={y} width={W} height={H} rx={2}
                  fill={isActive ? 'url(#activeGrad)' : 'rgba(255,255,255,0.04)'}
                  stroke={isActive ? 'rgba(92,225,230,0.5)' : 'rgba(255,255,255,0.06)'}
                  strokeWidth={0.5}
                  style={isActive ? { animation:`solarPulse 2.4s ${delayS}s ease-in-out infinite` } : {}}
                />
                {isActive && (
                  <g stroke="rgba(0,0,0,0.25)" strokeWidth={0.5}>
                    <line x1={x+W*0.33} y1={y} x2={x+W*0.33} y2={y+H}/>
                    <line x1={x+W*0.66} y1={y} x2={x+W*0.66} y2={y+H}/>
                    <line x1={x} y1={y+H*0.5} x2={x+W} y2={y+H*0.5}/>
                  </g>
                )}
                {isActive && (
                  <rect x={x+2} y={y+2} width={8} height={3} rx={1} fill="rgba(255,255,255,0.2)"/>
                )}
              </g>
            );
          })}
        </svg>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8 }}>
          <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text3)' }}>
            {active}/{TOTAL} panels
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ width:10, height:10, borderRadius:2, background:'url(#activeGrad)', backgroundColor:'rgba(92,225,230,0.7)' }}></div>
            <span style={{ fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.08em' }}>active</span>
          </div>
        </div>
      </div>
    );
  };

  // ── MAIN APP ───────────────────────────────────────────────────────────
  function AerocompactCalculator() {
    const [lang, setLang] = useState(() => { try{ const s=localStorage.getItem(LS_LANG); if(s&&T[s]) return s; }catch(e){} return "de"; });
    useEffect(()=>{ try{ localStorage.setItem(LS_LANG,lang); }catch(e){} },[lang]);
    const t = T[lang];

    const [isAdmin, setIsAdmin] = useState(()=>{ try{ const r=localStorage.getItem(LS_AUTH); if(!r) return false; const {exp}=JSON.parse(r); return exp&&Date.now()<exp; }catch(e){ return false; } });
    const [showLogin, setShowLogin] = useState(false);
    const [showBackend, setShowBackend] = useState(false);
    const [loginPw, setLoginPw] = useState(""); const [loginError, setLoginError] = useState("");

    const doLogin = async e => {
      e.preventDefault();
      const hash=await sha256Hex(loginPw);
      if(hash===ADMIN_PASSWORD_HASH) { const exp=Date.now()+4*3600000; localStorage.setItem(LS_AUTH,JSON.stringify({exp})); setIsAdmin(true); setShowLogin(false); setShowBackend(true); setLoginPw(""); setLoginError(""); }
      else { setLoginError(t.falschesPasswort); setLoginPw(""); }
    };
    const doLogout = () => { localStorage.removeItem(LS_AUTH); setIsAdmin(false); setShowBackend(false); };

    const [config, setConfig] = useState(()=>{ try{ const s=localStorage.getItem(LS_CONFIG); if(s) return JSON.parse(s); }catch(e){} return clone(FALLBACK_CONFIG); });
    useEffect(()=>{ try{ localStorage.setItem(LS_CONFIG,JSON.stringify(config)); }catch(e){} },[config]);
    const [countryFactors, setCountryFactors] = useState(()=>{ try{ const s=localStorage.getItem(LS_FACTORS); if(s) return JSON.parse(s); }catch(e){} return clone(FALLBACK_COUNTRY_FACTORS); });
    useEffect(()=>{ try{ localStorage.setItem(LS_FACTORS,JSON.stringify(countryFactors)); }catch(e){} },[countryFactors]);
    const resetAll = ()=>{ if(confirm(t.confirmReset)){ setConfig(clone(FALLBACK_CONFIG)); setCountryFactors(clone(FALLBACK_COUNTRY_FACTORS)); } };

    const idx = useMemo(()=>indexConfig(config),[config]);
    const flatSystemKeys = Object.keys(idx.flat);
    const flatSystemKeysVisible = flatSystemKeys.filter(s=>!s.endsWith(" alpine"));

    const [category, setCategory] = useState("Flat");
    const [flatSystem, setFlatSystem] = useState(flatSystemKeys[0]||"SN2");
    const [flatKlemmung, setFlatKlemmung] = useState("KSK");
    const [flatAusrichtung, setFlatAusrichtung] = useState("Süd");
    const [pitchSystem, setPitchSystem] = useState(idx.pitch[0]?.system||"XM-F");
    useEffect(()=>{ const sys=idx.flat[flatSystem]; if(!sys) return; if(!sys.klemmungen.includes(flatKlemmung)) setFlatKlemmung(sys.klemmungen[0]); if(!sys.ausrichtungen.includes(flatAusrichtung)) setFlatAusrichtung(sys.ausrichtungen[0]); },[flatSystem,idx]);

    const [windLoad, setWindLoad] = useState(0.5);
    const [snowLoad, setSnowLoad] = useState(1.0);
    const [country, setCountry] = useState("DE");
    const [modulePower, setModulePower] = useState(450);
    const [moduleCount, setModuleCount] = useState(100);
    const [discount, setDiscount] = useState(0);
    const [alpine, setAlpine] = useState(false);

    const hasAlpineVariant = sys=>!!idx.flat[`${sys} alpine`];

    const result = useMemo(()=>{
      let sysName,ausrichtung,klemmung;
      if(category==="Flat") { sysName=(alpine&&hasAlpineVariant(flatSystem))?`${flatSystem} alpine`:flatSystem; ausrichtung=flatAusrichtung; klemmung=flatKlemmung; }
      else if(category==="Pitch") { sysName=pitchSystem; ausrichtung="—"; klemmung="—"; }
      const effectiveSchnee=category==="Flat"?0.1:snowLoad;
      const r=richtpreisProKwp({ kategorie:category, system:sysName, ausrichtung, klemmung, wind:windLoad, schnee:effectiveSchnee, config, t });
      if(r.preis==null) return { ...r, totalKwp:(moduleCount*modulePower)/1000 };
      const cF=countryFactors[country]??1.0, dF=1-(discount/100);
      const pricePerKwp=r.preis*cF*dF, totalKwp=(moduleCount*modulePower)/1000;
      return { ...r, basePricePerKwp:r.preis, countryFactor:cF, discountFactor:dF, pricePerKwp, pricePerModule:pricePerKwp*(modulePower/1000), totalCost:pricePerKwp*totalKwp, totalKwp, systemDisplay:category==="Flat"?`${sysName} · ${klemmung} · ${ausrichtung}`:sysName };
    },[category,flatSystem,flatKlemmung,flatAusrichtung,pitchSystem,alpine,windLoad,snowLoad,country,modulePower,moduleCount,discount,config,countryFactors,lang]);

    const animKwp = useAnimatedNumber(result.totalKwp||0);
    const animPriceKwp = useAnimatedNumber(result.pricePerKwp||0);
    const animTotal = useAnimatedNumber(result.totalCost||0);

    const fmt2 = n=>new Intl.NumberFormat("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);

    const [jsonDraft,setJsonDraft]=useState(""); const [jsonError,setJsonError]=useState(""); const [jsonSuccess,setJsonSuccess]=useState("");
    const exportConfig=()=>{ setJsonDraft(JSON.stringify(config,null,2)); setJsonError(""); setJsonSuccess(""); };
    const importConfig=()=>{ try{ const p=JSON.parse(jsonDraft); if(!p.models||typeof p.models!=="object") throw new Error(t.expectModels); setConfig(p); setJsonError(""); setJsonSuccess(t.modelleImportiert(Object.keys(p.models).length)); }catch(err){ setJsonError(t.jsonError+" "+err.message); setJsonSuccess(""); } };

    const currentFlatSys=idx.flat[flatSystem];
    const currentModel=result.meta?.m;

    const CATS = [
      { id:"Flat", icon:"building-2", label:t.flat, sub:t.flatSub },
      { id:"Pitch", icon:"triangle", label:t.pitch, sub:t.pitchSub },
      { id:"METAL", icon:"layers", label:t.metal, sub:t.metalSub },
      { id:"GROUND", icon:"sun", label:t.ground, sub:t.groundSub },
    ];

    return (
      <div style={{ minHeight:'100vh' }}>
        {/* ── HEADER ── */}
        <header className="hdr">
          <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 24px', height:60, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:20 }}>
              <img src="logo.png" alt="AEROCOMPACT" style={{ height:22, filter:'invert(1) brightness(1.1)' }}/>
              <div style={{ width:1, height:24, background:'var(--border)' }}></div>
              <span style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text3)' }}>{t.title}</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {["de","en","it"].map(code=>(
                <button key={code} className={`lang-btn${lang===code?' active':''}`} onClick={()=>setLang(code)} style={{ color:lang===code?'#000':'var(--text3)' }}>{code}</button>
              ))}
              {isAdmin && (<>
                <div style={{ width:1, height:18, background:'var(--border)', margin:'0 4px' }}></div>
                <button className={`btn btn-ghost`} onClick={()=>setShowBackend(s=>!s)} style={{ padding:'6px 12px', fontSize:11, gap:5, background:showBackend?'var(--cyan-dim)':undefined, borderColor:showBackend?'rgba(92,225,230,0.4)':undefined }}>
                  <Icon name="settings" size={13}/> {t.backend}
                </button>
                <button className="btn btn-ghost" onClick={doLogout} style={{ padding:'6px 10px' }} title="Logout">
                  <Icon name="log-out" size={13}/>
                </button>
              </>)}
            </div>
          </div>
        </header>

        {/* ── BACKEND ── */}
        {isAdmin && showBackend && (
          <section style={{ borderBottom:'1px solid rgba(92,225,230,0.15)', background:'rgba(92,225,230,0.02)', padding:'28px 24px' }}>
            <div style={{ maxWidth:1200, margin:'0 auto' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <Icon name="database" size={16} style={{ color:'var(--cyan)' }}/>
                  <span style={{ fontSize:14, fontWeight:600, color:'var(--cyan)', textTransform:'uppercase', letterSpacing:'0.1em' }}>{t.backendTitle}</span>
                </div>
                <button className="btn btn-ghost" onClick={resetAll} style={{ fontSize:11, gap:5 }}>
                  <Icon name="rotate-ccw" size={12}/> {t.zuruecksetzen}
                </button>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                <div className="card" style={{ padding:20 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
                    <span style={{ fontSize:12, fontWeight:600, color:'var(--text2)' }}>{t.modellKonfig}</span>
                    <div style={{ display:'flex', gap:6 }}>
                      <button className="btn btn-ghost" onClick={exportConfig} style={{ fontSize:10, padding:'5px 10px', gap:4 }}><Icon name="download" size={11}/> {t.aktuellLaden}</button>
                      <button className="btn btn-primary" onClick={importConfig} disabled={!jsonDraft} style={{ fontSize:10, padding:'5px 10px', gap:4 }}><Icon name="upload" size={11}/> {t.importieren}</button>
                    </div>
                  </div>
                  <textarea value={jsonDraft} onChange={e=>{setJsonDraft(e.target.value);setJsonError("");setJsonSuccess("");}} placeholder={t.jsonPlaceholder} style={{ height:160, fontSize:11 }}/>
                  {jsonError && <p style={{ color:'#f87171', fontSize:11, marginTop:6 }}>{jsonError}</p>}
                  {jsonSuccess && <p style={{ color:'#4ade80', fontSize:11, marginTop:6 }}>{jsonSuccess}</p>}
                  <p style={{ fontSize:10, color:'var(--text3)', fontFamily:'var(--mono)', marginTop:6 }}>{config.meta?.stand||"—"} · {Object.keys(config.models).length} {t.modelleAktiv}</p>
                </div>
                <div className="card" style={{ padding:20 }}>
                  <p style={{ fontSize:12, fontWeight:600, color:'var(--text2)', marginBottom:14 }}>{t.laenderfaktoren}</p>
                  <table style={{ width:'100%', borderCollapse:'collapse' }}>
                    <thead><tr>
                      <th style={{ fontSize:10, color:'var(--text3)', textAlign:'left', paddingBottom:8, textTransform:'uppercase', letterSpacing:'0.08em' }}>{t.land}</th>
                      <th style={{ fontSize:10, color:'var(--text3)', textAlign:'right', paddingBottom:8, textTransform:'uppercase', letterSpacing:'0.08em' }}>Faktor</th>
                    </tr></thead>
                    <tbody>{Object.entries(countryFactors).map(([code,val])=>(
                      <tr key={code} style={{ borderTop:'1px solid var(--border)' }}>
                        <td style={{ padding:'8px 0', fontSize:12, color:'var(--text2)' }}>{code}</td>
                        <td style={{ padding:'8px 0', textAlign:'right' }}>
                          <input type="number" step="0.01" className="num-inp" style={{ width:80, fontSize:13 }} value={val} onChange={e=>setCountryFactors({...countryFactors,[code]:parseFloat(e.target.value)||0})}/>
                        </td>
                      </tr>
                    ))}</tbody>
                  </table>
                  <p style={{ fontSize:10, color:'var(--text3)', marginTop:10, fontFamily:'var(--mono)' }}>{t.laenderfaktorenSub}</p>
                </div>
              </div>
              {currentModel && (
                <div className="card" style={{ padding:20, marginTop:16 }}>
                  <p style={{ fontSize:12, fontWeight:600, color:'var(--text2)', marginBottom:12 }}>
                    {t.aktuellesModell} <span style={{ color:'var(--cyan)' }}>{result.systemDisplay}</span>
                  </p>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
                    {[
                      [t.modelltyp, currentModel.type],
                      [t.windRange, currentModel.wind_range?`[${currentModel.wind_range}]`:"—"],
                      [t.snowRange, currentModel.snow_range?`[${currentModel.snow_range}]`:t.fixSnow],
                      ["R²", currentModel.r_squared??currentModel.wind_r_squared??"—"],
                      [t.anfrageWind, currentModel.wind_anfrage_threshold!=null?`≥ ${currentModel.wind_anfrage_threshold}`:"—"],
                      [t.anfrageSchnee, currentModel.snow_anfrage_threshold!=null?`≥ ${currentModel.snow_anfrage_threshold}`:"—"],
                      ["RMSE", currentModel.rmse??"—"],
                      [t.datenpunkte, currentModel.n_data_points??"—"],
                    ].map(([k,v])=>(
                      <div key={k}>
                        <div style={{ fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:12, color:'var(--text2)', fontFamily:'var(--mono)' }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </section>
        )}

        {/* ── MAIN ── */}
        <main style={{ maxWidth:1200, margin:'0 auto', padding:'40px 24px 80px', display:'flex', gap:28, alignItems:'flex-start' }} className="main-grid">

          {/* ── LEFT COL ── */}
          <div style={{ flex:'0 0 58%', display:'flex', flexDirection:'column', gap:20 }}>

            {/* System Category */}
            <div className="card" style={{ padding:28 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:20 }}>
                <Icon name="layers" size={16} style={{ color:'var(--cyan)' }}/>
                <span style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--text2)' }}>{t.montagesystem}</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20 }}>
                {CATS.map(cat=>(
                  <button key={cat.id} className={`cat-card${category===cat.id?' active':''}`} onClick={()=>setCategory(cat.id)}>
                    <span className="cat-icon"><Icon name={cat.icon} size={18}/></span>
                    <span>
                      <div style={{ fontSize:13, fontWeight:600, color:'var(--text)', marginBottom:2 }}>{cat.label}</div>
                      <div style={{ fontSize:11, color:'var(--text3)' }}>{cat.sub}</div>
                    </span>
                  </button>
                ))}
              </div>

              {/* System detail */}
              {category==="Flat" && (
                <div className="fade-up" style={{ borderTop:'1px solid var(--border)', paddingTop:20, display:'flex', flexDirection:'column', gap:16 }}>
                  <div>
                    <div className="lbl" style={{ marginBottom:10 }}>{t.system}</div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                      {flatSystemKeysVisible.map(s=>(
                        <button key={s} className={`chip${flatSystem===s?' active':''}`} onClick={()=>setFlatSystem(s)}>{s}</button>
                      ))}
                    </div>
                  </div>
                  {hasAlpineVariant(flatSystem) && (
                    <div className={`toggle-wrap${alpine?' on':''}`} onClick={()=>setAlpine(a=>!a)}>
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <Icon name="mountain-snow" size={16} style={{ color:alpine?'var(--cyan)':'var(--text3)' }}/>
                        <div>
                          <div style={{ fontSize:13, fontWeight:600, color:alpine?'var(--text)':'var(--text2)' }}>{t.alpineLabel}</div>
                          <div style={{ fontSize:11, color:'var(--text3)' }}>{t.alpineSub}</div>
                        </div>
                      </div>
                      <div className="toggle-track" style={{ background:alpine?'var(--cyan)':'rgba(255,255,255,0.08)' }}>
                        <div className="toggle-thumb" style={{ left:alpine?'19px':'3px', background:alpine?'#000':'rgba(255,255,255,0.5)' }}/>
                      </div>
                    </div>
                  )}
                  {currentFlatSys && (
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
                      <div>
                        <div className="lbl" style={{ marginBottom:8 }}>{t.klemmung}</div>
                        {currentFlatSys.klemmungen.length>1
                          ? <Segmented value={flatKlemmung} onChange={setFlatKlemmung} options={["KSK","LSK"].map(k=>({ value:k, label:k==="KSK"?t.ksk:t.lsk, disabled:!currentFlatSys.klemmungen.includes(k) }))}/>
                          : <div style={{ padding:'9px 12px', border:'1px solid var(--border)', borderRadius:'var(--rad-sm)', fontSize:12, color:'var(--text2)' }}>{currentFlatSys.klemmungen[0]==="KSK"?t.ksk:currentFlatSys.klemmungen[0]==="LSK"?t.lsk:currentFlatSys.klemmungen[0]}</div>
                        }
                      </div>
                      <div>
                        <div className="lbl" style={{ marginBottom:8 }}>{t.ausrichtung}</div>
                        {currentFlatSys.ausrichtungen.length>1
                          ? <Segmented value={flatAusrichtung} onChange={setFlatAusrichtung} options={["Ost/West","Süd"].map(a=>({ value:a, label:a==="Ost/West"?t.ow:t.sued, disabled:!currentFlatSys.ausrichtungen.includes(a) }))}/>
                          : <div style={{ padding:'9px 12px', border:'1px solid var(--border)', borderRadius:'var(--rad-sm)', fontSize:12, color:'var(--text2)' }}>{currentFlatSys.ausrichtungen[0]==="Ost/West"?t.ow:currentFlatSys.ausrichtungen[0]==="Süd"?t.sued:currentFlatSys.ausrichtungen[0]}</div>
                        }
                      </div>
                    </div>
                  )}
                </div>
              )}
              {category==="Pitch" && (
                <div className="fade-up" style={{ borderTop:'1px solid var(--border)', paddingTop:20 }}>
                  <div className="lbl" style={{ marginBottom:10 }}>{t.system}</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    {idx.pitch.map(p=>(
                      <button key={p.system} className={`chip${pitchSystem===p.system?' active':''}`} onClick={()=>setPitchSystem(p.system)}>{p.system}</button>
                    ))}
                  </div>
                </div>
              )}
              {(category==="METAL"||category==="GROUND") && (
                <div className="fade-up" style={{ borderTop:'1px solid var(--border)', paddingTop:20, textAlign:'center', padding:'20px 0 4px' }}>
                  <div style={{ width:48, height:48, borderRadius:'50%', background:'var(--amber-dim)', border:'1px solid rgba(240,168,48,0.2)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px' }}>
                    <Icon name="mail" size={20} style={{ color:'var(--amber)' }}/>
                  </div>
                  <p style={{ fontSize:14, fontWeight:600, color:'var(--text2)', marginBottom:6 }}>{PLACEHOLDER_CATEGORIES[category].label}</p>
                  <p style={{ fontSize:12, color:'var(--text3)', marginBottom:8 }}>{t.kostenfunktionenFolgen(PLACEHOLDER_CATEGORIES[category].systems.join(", "))}</p>
                  <p style={{ fontSize:12, color:'var(--amber)', fontStyle:'italic' }}>{t.bitteVertriebAnfragen}</p>
                </div>
              )}
            </div>

            {/* Location & Loads */}
            <div className="card" style={{ padding:28 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:22 }}>
                <Icon name="map-pin" size={16} style={{ color:'var(--cyan)' }}/>
                <span style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--text2)' }}>{t.standortLasten}</span>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:22 }}>
                <div>
                  <div className="lbl" style={{ marginBottom:8 }}>{t.land}</div>
                  <select className="inp" value={country} onChange={e=>setCountry(e.target.value)}>
                    {Object.keys(countryFactors).map(c=>(
                      <option key={c} value={c}>{t.countries[c]||c}</option>
                    ))}
                  </select>
                </div>
                <SliderField label={t.windlast} value={windLoad} min={0.1} max={3} step={0.1} onChange={setWindLoad} unit="kN/m²" iconName="wind"/>
                {category==="Pitch" && (
                  <div style={{ borderTop:'1px solid var(--border)', paddingTop:20 }}>
                    <SliderField label={t.schneelast} value={snowLoad} min={0.1} max={4} step={0.1} onChange={setSnowLoad} unit="kN/m²" iconName="snowflake"/>
                  </div>
                )}
                {category==="Flat" && (
                  <div style={{ display:'flex', alignItems:'center', gap:7, padding:'10px 14px', borderRadius:'var(--rad-sm)', background:'rgba(255,255,255,0.02)', border:'1px solid var(--border)' }}>
                    <Icon name="info" size={13} style={{ color:'var(--text3)', flexShrink:0 }}/>
                    <span style={{ fontSize:12, color:'var(--text3)', fontStyle:'italic' }}>{t.flatHinweis}</span>
                  </div>
                )}
              </div>
            </div>

            {/* Module & Terms */}
            <div className="card" style={{ padding:28 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:22 }}>
                <Icon name="zap" size={16} style={{ color:'var(--amber)' }}/>
                <span style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', color:'var(--text2)' }}>{t.modulKonditionen}</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16 }}>
                <div>
                  <div className="lbl" style={{ marginBottom:8 }}>{t.leistung}</div>
                  <input type="number" className="inp num-inp" value={modulePower} onChange={e=>setModulePower(Number(e.target.value))} style={{ textAlign:'left' }}/>
                  <div style={{ fontSize:10, color:'var(--text3)', marginTop:5, fontFamily:'var(--mono)' }}>{config.meta?.modul||"—"}</div>
                </div>
                <div>
                  <div className="lbl" style={{ marginBottom:8 }}>{t.anzahlModule}</div>
                  <input type="number" className="inp num-inp" value={moduleCount} onChange={e=>setModuleCount(Number(e.target.value))} style={{ textAlign:'left' }}/>
                  <div style={{ fontSize:10, color:'var(--text3)', marginTop:5, fontFamily:'var(--mono)' }}>{fmt2(result.totalKwp||0)} kWp</div>
                </div>
                <div>
                  <div className="lbl" style={{ marginBottom:8 }}>{t.rabatt}</div>
                  <input type="number" min="0" max="100" className="inp num-inp" value={discount} onChange={e=>setDiscount(Number(e.target.value))} style={{ color:'var(--cyan)', textAlign:'left' }}/>
                  <div style={{ fontSize:10, color:'var(--text3)', marginTop:5 }}>&nbsp;</div>
                </div>
              </div>
            </div>
          </div>

          {/* ── RIGHT COL ── */}
          <div className="right-col" style={{ flex:'1', position:'sticky', top:80, display:'flex', flexDirection:'column', gap:20 }}>

            {/* Result */}
            <div className="result-glow" style={{ padding:28 }}>
              {/* Anfrage */}
              {(result.status==="anfrage"||result.status==="unbekannt") && (
                <div className="fade-up">
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
                    <div style={{ width:42, height:42, borderRadius:'50%', background:result.status==="anfrage"?'var(--cyan-dim)':'rgba(248,113,113,0.1)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                      <Icon name={result.status==="anfrage"?"phone":"alert-triangle"} size={18} style={{ color:result.status==="anfrage"?'var(--cyan)':'#f87171' }}/>
                    </div>
                    <div>
                      <div style={{ fontSize:16, fontWeight:700, color:'var(--text)', marginBottom:3 }}>
                        {result.status==="anfrage"?t.preisAufAnfrage:t.modellNichtVerfuegbar}
                      </div>
                      <div style={{ fontSize:12, color:'var(--text3)' }}>{result.meta?.grund||result.meta?.reason}</div>
                    </div>
                  </div>
                </div>
              )}

              {/* Normal result */}
              {result.preis!=null && (
                <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:16 }}>
                  {result.status==="extrapoliert" && (
                    <div className="badge badge-warn" style={{ alignSelf:'flex-start' }}>
                      <Icon name="alert-triangle" size={11}/> {t.extrapoliert}
                    </div>
                  )}

                  {/* €/kWp hero */}
                  <div>
                    <div className="lbl" style={{ marginBottom:8 }}>{t.kostenProKwp}</div>
                    <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                      <span style={{ fontFamily:'var(--mono)', fontSize:46, fontWeight:600, color:'var(--cyan)', lineHeight:1, letterSpacing:'-0.02em' }}>
                        {fmt2(animPriceKwp)}
                      </span>
                      <span style={{ fontSize:14, color:'var(--text3)' }}>€ / kWp</span>
                    </div>
                  </div>

                  <div style={{ height:1, background:'var(--border)' }}></div>

                  {/* Per Module */}
                  <div>
                    <div className="lbl" style={{ marginBottom:8 }}>{t.kostenProModul} · {moduleCount} {t.moduleLabel}</div>
                    <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                      <span style={{ fontFamily:'var(--mono)', fontSize:30, fontWeight:600, color:'var(--text)', lineHeight:1 }}>
                        {fmt2(result.pricePerModule)}
                      </span>
                      <span style={{ fontSize:13, color:'var(--text3)' }}>€</span>
                    </div>
                  </div>

                  <div style={{ height:1, background:'var(--border)' }}></div>

                  {/* Total */}
                  <div>
                    <div className="lbl" style={{ marginBottom:8 }}>{t.gesamtkosten} · {fmt2(animKwp)} kWp</div>
                    <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                      <span style={{ fontFamily:'var(--mono)', fontSize:30, fontWeight:600, color:'var(--text)', lineHeight:1 }}>
                        {fmt2(animTotal)}
                      </span>
                      <span style={{ fontSize:13, color:'var(--text3)' }}>€</span>
                    </div>
                  </div>

                  {/* Breakdown */}
                  {(result.countryFactor!==1||result.discountFactor!==1) && (
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:14 }}>
                      <div className="bk-row">
                        <span style={{ color:'var(--text3)' }}>{t.modellpreis}</span>
                        <span style={{ color:'var(--text2)' }}>€ {fmt2(result.basePricePerKwp)} /kWp</span>
                      </div>
                      {result.countryFactor!==1 && (
                        <div className="bk-row">
                          <span style={{ color:'var(--text3)' }}>{t.laenderfaktor} {country}</span>
                          <span style={{ color:'var(--text2)' }}>× {result.countryFactor.toFixed(2)}</span>
                        </div>
                      )}
                      {result.discountFactor!==1 && (
                        <div className="bk-row">
                          <span style={{ color:'var(--text3)' }}>{t.rabattLine}</span>
                          <span style={{ color:'var(--cyan)' }}>− {discount}%</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Disclaimer */}
            <div style={{ padding:'14px 18px', borderRadius:'var(--rad-sm)', border:'1px solid var(--border)', background:'var(--surface)' }}>
              <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text3)', marginBottom:5 }}>{t.disclaimerTitle}</div>
              <p style={{ fontSize:11, color:'var(--text3)', lineHeight:1.6 }}>{t.disclaimerBody} {config.meta?.stand||"—"}.</p>
            </div>
          </div>
        </main>

        {/* ── LOGIN BUTTON ── */}
        {!isAdmin && (
          <button onClick={()=>{setShowLogin(true);setLoginError("");}} style={{ position:'fixed', bottom:24, right:24, zIndex:40, width:36, height:36, borderRadius:'50%', border:'1px solid var(--border)', background:'var(--surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:0.35, transition:'opacity 0.2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.35'} title="Admin">
            <Icon name="lock" size={14} style={{ color:'var(--text2)' }}/>
          </button>
        )}

        {/* ── LOGIN MODAL ── */}
        {showLogin && !isAdmin && (
          <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(12px)', zIndex:50, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }} onClick={()=>setShowLogin(false)}>
            <form onSubmit={doLogin} onClick={e=>e.stopPropagation()} style={{ background:'#0D0F1A', border:'1px solid rgba(92,225,230,0.2)', borderRadius:14, padding:36, width:'100%', maxWidth:360, boxShadow:'0 0 60px rgba(92,225,230,0.1)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:24, paddingBottom:20, borderBottom:'1px solid var(--border)' }}>
                <div style={{ width:38, height:38, borderRadius:'50%', background:'var(--cyan-dim)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Icon name="lock" size={16} style={{ color:'var(--cyan)' }}/>
                </div>
                <span style={{ fontSize:15, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em' }}>{t.adminLogin}</span>
              </div>
              <div className="lbl" style={{ marginBottom:8 }}>{t.passwort}</div>
              <input type="password" autoFocus value={loginPw} onChange={e=>setLoginPw(e.target.value)} className="inp" style={{ marginBottom:6 }}/>
              {loginError && <p style={{ color:'#f87171', fontSize:12, marginBottom:8 }}>{loginError}</p>}
              <div style={{ display:'flex', gap:10, marginTop:20 }}>
                <button type="button" className="btn btn-ghost" style={{ flex:1 }} onClick={()=>{setShowLogin(false);setLoginPw("");setLoginError("");}}>{t.abbrechen}</button>
                <button type="submit" className="btn btn-primary" style={{ flex:1 }}>{t.loginBtn}</button>
              </div>
              <p style={{ fontSize:11, color:'var(--text3)', textAlign:'center', marginTop:14 }}>{t.sessionHinweis}</p>
            </form>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<AerocompactCalculator/>);
</script>
</body>
</html>
