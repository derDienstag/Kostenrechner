      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(hash))

        .join("");

    // -------------------------------------------------------------------
    // Math-Helper (Horner-Schema, höchste Potenz zuerst)
    // -------------------------------------------------------------------
    function evalPoly(coef, x) {
      let y = 0;
      for (const c of coef) y = y * x + c;
      return y;
    }

    function makeKey(kategorie, system, ausrichtung, klemmung) {
      if (kategorie === "Pitch") return `Pitch|${system}|—|—`;
      return `Flat|${system}|${ausrichtung}|${klemmung}`;
    }

    // Hauptberechnung (€/kWp)
    function richtpreisProKwp({ kategorie, system, ausrichtung, klemmung, schnee, wind, config, t }) {
      // Platzhalter-Kategorien sofort als Anfrage
      if (kategorie === "METAL" || kategorie === "GROUND") {
        return {
          preis: null, status: "anfrage",
          meta: { reason: t ? t.datenInAktualisierung : "Daten in Aktualisierung – Preis auf Anfrage" }
        };
      }

      const key = makeKey(kategorie, system, ausrichtung, klemmung);
      const m = config.models[key];
      if (!m) {
        return { preis: null, status: "unbekannt", meta: { key, reason: "—" } };
      }

      // Anfrage-Schwellen
      if (m.wind_anfrage_threshold != null && wind >= m.wind_anfrage_threshold) {
        const lbl = t ? t.windlast : "Wind";
        return {
          preis: null, status: "anfrage",
          meta: { key, grund: `${lbl} ≥ ${m.wind_anfrage_threshold} kN/m²` }
        };
      }
      if (m.snow_anfrage_threshold != null && schnee >= m.snow_anfrage_threshold) {
        const lbl = t ? t.schneelast : "Schnee";
        return {
          preis: null, status: "anfrage",
          meta: { key, grund: `${lbl} ≥ ${m.snow_anfrage_threshold} kN/m²` }
        };
      }

      let preis;
      if (m.type === "constant") {
        preis = m.value;
      } else if (m.type === "poly_wind") {
        preis = evalPoly(m.wind_coef, wind);
      } else if (m.type === "separable_2d") {
        preis = m.base + evalPoly(m.wind_coef, wind) + evalPoly(m.snow_coef, schnee);
      } else {
        return { preis: null, status: "unbekannt", meta: { key, reason: `Unbekannter Modelltyp ${m.type}` } };
      }

      // Bereichscheck
      let status = "ok";
      const ausserhalb = [];
      const windLbl = t ? t.windlast : "Wind";
      const snowLbl = t ? t.schneelast : "Schnee";
      if (m.wind_range && (wind < m.wind_range[0] || wind > m.wind_range[1])) {
        ausserhalb.push(`${windLbl} ${wind.toFixed(1)} ∉ [${m.wind_range[0]}, ${m.wind_range[1]}]`);
      }
      if (m.snow_range && (schnee < m.snow_range[0] || schnee > m.snow_range[1])) {
        ausserhalb.push(`${snowLbl} ${schnee.toFixed(1)} ∉ [${m.snow_range[0]}, ${m.snow_range[1]}]`);
      }
      if (ausserhalb.length) status = "extrapoliert";

      return {
        preis: Math.round(preis * 100) / 100,
        status,
        meta: { key, ausserhalb, model: m.type, fixed_snow: m.fixed_snow, m }
      };
    }

    // Index für UI (System → verfügbare Klemmung/Ausrichtung)
    function indexConfig(config) {
      const flat = {}, pitch = [];
      for (const [key, m] of Object.entries(config.models)) {
        if (m.kategorie === "Flat") {
          if (!flat[m.system]) flat[m.system] = { system: m.system, variants: [] };
          flat[m.system].variants.push({ key, klemmung: m.klemmung, ausrichtung: m.ausrichtung });
        } else if (m.kategorie === "Pitch") {
          pitch.push({ key, system: m.system });
        }
      }
      for (const sys of Object.values(flat)) {
        sys.klemmungen   = [...new Set(sys.variants.map(v => v.klemmung))];
        sys.ausrichtungen = [...new Set(sys.variants.map(v => v.ausrichtung))];
      }
      return { flat, pitch };
    }

    const clone = (o) => JSON.parse(JSON.stringify(o));

    // -------------------------------------------------------------------
    // Icon Component
    // -------------------------------------------------------------------
    const Icon = ({ name, size = 20, className = "" }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          ref.current.appendChild(el);
          if (window.lucide) window.lucide.createIcons({ icons: window.lucide.icons });
        }
      }, [name]);
      return <span ref={ref} className={`lucide-icon ${className}`} style={{ width: size, height: size }} />;
    };

    // Segmented Control
    const Segmented = ({ value, onChange, options }) => (
      <div className="inline-flex border border-gray-700 bg-black w-full">
        {options.map((opt, i) => {
          const active = value === opt.value;
          const disabled = opt.disabled;
          return (
            <button
              key={opt.value}
              type="button"
              disabled={disabled}
              onClick={() => !disabled && onChange(opt.value)}
              className={`flex-1 px-3 py-2 text-xs font-semibold uppercase tracking-wider transition-colors ${
                active
                  ? "bg-[#5CE1E6] text-black"
                  : disabled
                    ? "text-gray-700 cursor-not-allowed"
                    : "text-gray-400 hover:text-white hover:bg-[#5CE1E6]/5"
              } ${i > 0 ? "border-l border-gray-700" : ""}`}
            >
              {opt.label}
            </button>
          );
        })}
      </div>
    );

    // -------------------------------------------------------------------
    // App
    // -------------------------------------------------------------------
    function AerocompactCalculator() {
      // --- Sprache ---
      const [lang, setLang] = useState(() => {
        try {
          const saved = localStorage.getItem(LS_LANG);
          if (saved && TRANSLATIONS[saved]) return saved;
        } catch (e) {}
        return "de";
      });
      useEffect(() => {
        try { localStorage.setItem(LS_LANG, lang); } catch (e) {}
      }, [lang]);
      const t = TRANSLATIONS[lang];

      // --- Admin Session ---
      const [isAdmin, setIsAdmin] = useState(() => {
        try {
          const raw = localStorage.getItem(LS_AUTH);
          if (!raw) return false;
          const { exp } = JSON.parse(raw);
          return exp && Date.now() < exp;
        } catch (e) { return false; }
      });
      const [showLogin, setShowLogin] = useState(false);
      const [showBackend, setShowBackend] = useState(false);
      const [loginPw, setLoginPw] = useState("");
      const [loginError, setLoginError] = useState("");

      const doLogin = async (e) => {
        e.preventDefault();
        const hash = await sha256Hex(loginPw);
        if (hash === ADMIN_PASSWORD_HASH) {
          const exp = Date.now() + 4 * 60 * 60 * 1000;
          localStorage.setItem(LS_AUTH, JSON.stringify({ exp }));
          setIsAdmin(true);
          setShowLogin(false);
          setShowBackend(true);
          setLoginPw("");
          setLoginError("");
        } else {
          setLoginError(t.falschesPasswort);
          setLoginPw("");
        }
      };
      const doLogout = () => {
        localStorage.removeItem(LS_AUTH);
        setIsAdmin(false);
        setShowBackend(false);
      };

      // --- Config (persistent) ---
      const [config, setConfig] = useState(() => {
        try {
          const saved = localStorage.getItem(LS_CONFIG);
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return clone(FALLBACK_CONFIG);
      });
      useEffect(() => {
        try { localStorage.setItem(LS_CONFIG, JSON.stringify(config)); } catch (e) {}
      }, [config]);

      // --- Country Factors (persistent) ---
      const [countryFactors, setCountryFactors] = useState(() => {
        try {
          const saved = localStorage.getItem(LS_FACTORS);
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return clone(FALLBACK_COUNTRY_FACTORS);
      });
      useEffect(() => {
        try { localStorage.setItem(LS_FACTORS, JSON.stringify(countryFactors)); } catch (e) {}
      }, [countryFactors]);

      const resetAll = () => {
        if (confirm(t.confirmReset)) {
          setConfig(clone(FALLBACK_CONFIG));
          setCountryFactors(clone(FALLBACK_COUNTRY_FACTORS));
        }
      };

      // --- Indexed config for UI ---
      const idx = useMemo(() => indexConfig(config), [config]);
      const flatSystemKeys = Object.keys(idx.flat);

      // --- Input State ---
      const [category, setCategory] = useState("Flat"); // Flat | Pitch | METAL | GROUND
      const [flatSystem, setFlatSystem] = useState(flatSystemKeys[0] || "SN2");
      const [flatKlemmung, setFlatKlemmung] = useState("KSK");
      const [flatAusrichtung, setFlatAusrichtung] = useState("Süd");
      const [pitchSystem, setPitchSystem] = useState(idx.pitch[0]?.system || "XM-F");

      // Sync Klemmung/Ausrichtung mit verfügbaren Optionen
      useEffect(() => {
        const sys = idx.flat[flatSystem];
        if (!sys) return;
        if (!sys.klemmungen.includes(flatKlemmung)) setFlatKlemmung(sys.klemmungen[0]);
        if (!sys.ausrichtungen.includes(flatAusrichtung)) setFlatAusrichtung(sys.ausrichtungen[0]);
      }, [flatSystem, idx]);

      const [windLoad, setWindLoad] = useState(0.5);
      const [snowLoad, setSnowLoad] = useState(1.0);
      const [country, setCountry] = useState("DE");
      const [modulePower, setModulePower] = useState(450);
      const [moduleCount, setModuleCount] = useState(100);
      const [discount, setDiscount] = useState(0);
      const [alpine, setAlpine] = useState(false);

      // Welche FLAT-Systeme haben eine alpine-Variante?
      const hasAlpineVariant = (sys) => !!idx.flat[`${sys} alpine`];
      // System-Dropdown ohne " alpine"-Einträge
      const flatSystemKeysVisible = flatSystemKeys.filter((s) => !s.endsWith(" alpine"));

      // --- Berechnung ---
      const result = useMemo(() => {
        let sysName, ausrichtung, klemmung;
        if (category === "Flat") {
          sysName = (alpine && hasAlpineVariant(flatSystem)) ? `${flatSystem} alpine` : flatSystem;
          ausrichtung = flatAusrichtung;
          klemmung = flatKlemmung;
        } else if (category === "Pitch") {
          sysName = pitchSystem;
          ausrichtung = "—";
          klemmung = "—";
        }

        // Für FLAT ist Schnee fix 0.1
        const effectiveSchnee = category === "Flat" ? 0.1 : snowLoad;

        const r = richtpreisProKwp({
          kategorie: category,
          system: sysName,
          ausrichtung,
          klemmung,
          wind: windLoad,
          schnee: effectiveSchnee,
          config,
          t,
        });

        if (r.preis == null) {
          return { ...r, totalKwp: (moduleCount * modulePower) / 1000 };
        }

        // Kommerzielle Multiplikatoren
        const countryFactor = countryFactors[country] ?? 1.0;
        const discountFactor = 1 - (discount / 100);

        const pricePerKwp = r.preis * countryFactor * discountFactor;
        const totalKwp = (moduleCount * modulePower) / 1000;
        const totalCost = pricePerKwp * totalKwp;
        const pricePerModule = pricePerKwp * (modulePower / 1000);

        return {
          ...r,
          basePricePerKwp: r.preis,
          countryFactor,
          discountFactor,
          pricePerKwp,
          pricePerModule,
          totalCost,
          totalKwp,
          systemDisplay: category === "Flat"
            ? `${sysName} · ${klemmung} · ${ausrichtung}`
            : sysName,
        };
      }, [
        category, flatSystem, flatKlemmung, flatAusrichtung, pitchSystem, alpine,
        windLoad, snowLoad, country, modulePower, moduleCount, discount,
        config, countryFactors, lang,
      ]);

      // Format
      const fmtEur = (n) => new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      }).format(n);
      const fmtNum = (n) => new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      }).format(n);

      // --- Backend: JSON-Import ---
      const [jsonDraft, setJsonDraft] = useState("");
      const [jsonError, setJsonError] = useState("");
      const [jsonSuccess, setJsonSuccess] = useState("");

      const exportConfig = () => {
        setJsonDraft(JSON.stringify(config, null, 2));
        setJsonError("");
        setJsonSuccess("");
      };
      const importConfig = () => {
        try {
          const parsed = JSON.parse(jsonDraft);
          if (!parsed.models || typeof parsed.models !== "object") {
            throw new Error(t.expectModels);
          }
          setConfig(parsed);
          setJsonError("");
          setJsonSuccess(t.modelleImportiert(Object.keys(parsed.models).length));
        } catch (err) {
          setJsonError(t.jsonError + " " + err.message);
          setJsonSuccess("");
        }
      };

      // ===================================================================
      // RENDER
      // ===================================================================
      const currentFlatSys = idx.flat[flatSystem];
      const currentModel = result.meta?.m;

      return (
        <div className="min-h-screen bg-black text-white font-sans selection:bg-[#5CE1E6] selection:text-black pb-12">
          {/* Header */}
          <header className="bg-[#0A0A0A] border-b border-gray-800 shadow-sm py-6 px-4 sm:px-8">
            <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-4">
                <img src="logo.png" alt="AEROCOMPACT" className="h-8 w-auto logo-invert" />
                <div className="hidden md:block h-8 w-px bg-gray-800"></div>
                <span className="hidden md:inline text-sm uppercase tracking-[0.2em] text-gray-400 font-light">
                  {t.title}
                </span>
              </div>
              <div className="flex items-center gap-3">
                {/* Language Switcher */}
                <div className="inline-flex border border-gray-800">
                  {["de", "en", "it"].map((code) => (
                    <button
                      key={code}
                      onClick={() => setLang(code)}
                      className={`px-2.5 py-1 text-[11px] font-semibold uppercase tracking-wider transition-colors ${
                        lang === code
                          ? "bg-[#5CE1E6] text-black"
                          : "text-gray-500 hover:text-white"
                      } ${code !== "de" ? "border-l border-gray-800" : ""}`}
                    >
                      {code}
                    </button>
                  ))}
                </div>
                {isAdmin && (
                  <>
                    <button
                      onClick={() => setShowBackend((s) => !s)}
                      className={`flex items-center gap-2 px-3 py-2 border text-sm font-semibold uppercase tracking-wider transition-colors ${
                        showBackend
                          ? "border-[#5CE1E6] text-black bg-[#5CE1E6]"
                          : "border-gray-700 text-gray-400 hover:border-[#5CE1E6] hover:text-[#5CE1E6]"
                      }`}
                    >
                      <Icon name="settings" size={16} /> {t.backend}
                    </button>
                    <button
                      onClick={doLogout}
                      className="flex items-center gap-2 px-3 py-2 border border-gray-700 text-gray-400 hover:border-red-500 hover:text-red-500 text-sm font-semibold uppercase tracking-wider"
                      title="Admin-Logout"
                    >
                      <Icon name="log-out" size={16} />
                    </button>
                  </>
                )}
              </div>
            </div>
          </header>

          {/* Floating Login Button */}
          {!isAdmin && (
            <button
              onClick={() => { setShowLogin(true); setLoginError(""); }}
              aria-label="Admin-Login"
              className="fixed bottom-6 right-6 z-40 w-10 h-10 flex items-center justify-center text-gray-700 hover:text-[#5CE1E6] transition-all duration-300 opacity-40 hover:opacity-100 hover:scale-110"
              title="Admin-Login"
            >
              <Icon name="lock" size={16} />
            </button>
          )}

          {/* Login Modal */}
          {showLogin && !isAdmin && (
            <div
              className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4"
              onClick={() => setShowLogin(false)}
            >
              <form
                onClick={(e) => e.stopPropagation()}
                onSubmit={doLogin}
                className="bg-[#0A0A0A] border border-[#5CE1E6]/40 p-8 max-w-sm w-full"
                style={{ boxShadow: "0 0 40px rgba(92, 225, 230, 0.15)" }}
              >
                <div className="flex items-center gap-3 mb-6 pb-4 border-b border-gray-800">
                  <Icon name="lock" size={20} className="text-[#5CE1E6]" />
                  <h3 className="text-lg font-bold uppercase tracking-wider">{t.adminLogin}</h3>
                </div>
                <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wider">{t.passwort}</label>
                <input
                  type="password"
                  autoFocus
                  value={loginPw}
                  onChange={(e) => setLoginPw(e.target.value)}
                  className="w-full p-3 bg-black border border-gray-700 text-white focus:border-[#5CE1E6] outline-none mb-2"
                />
                {loginError && <p className="text-xs text-red-400 mb-2">{loginError}</p>}
                <div className="flex gap-3 mt-6">
                  <button
                    type="button"
                    onClick={() => { setShowLogin(false); setLoginPw(""); setLoginError(""); }}
                    className="flex-1 p-3 border border-gray-700 text-gray-400 hover:text-white hover:border-gray-500 uppercase text-sm tracking-wider"
                  >
                    {t.abbrechen}
                  </button>
                  <button
                    type="submit"
                    className="flex-1 p-3 bg-[#5CE1E6] text-black font-bold uppercase text-sm tracking-wider hover:bg-[#5CE1E6]/90"
                  >
                    {t.loginBtn}
                  </button>
                </div>
                <p className="text-xs text-gray-600 mt-4 text-center">{t.sessionHinweis}</p>
              </form>
            </div>
          )}

          {/* Backend Panel */}
          {isAdmin && showBackend && (
            <section className="bg-[#0A0A0A] border-b border-[#5CE1E6]/30 px-4 sm:px-8 py-6">
              <div className="max-w-6xl mx-auto">
                <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
                  <h2 className="text-lg font-bold uppercase tracking-wider text-[#5CE1E6] flex items-center gap-2">
                    <Icon name="database" size={18} /> {t.backendTitle}
                  </h2>
                  <button
                    onClick={resetAll}
                    className="flex items-center gap-2 text-xs text-gray-400 hover:text-[#5CE1E6] uppercase tracking-wider"
                  >
                    <Icon name="rotate-ccw" size={14} /> {t.zuruecksetzen}
                  </button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                  {/* JSON Import */}
                  <div className="bg-black border border-gray-800 p-4">
                    <div className="flex items-center justify-between mb-3">
                      <p className="text-sm font-semibold text-white">{t.modellKonfig}</p>
                      <div className="flex gap-2">
                        <button
                          onClick={exportConfig}
                          className="text-xs px-2 py-1 border border-gray-700 text-gray-400 hover:text-[#5CE1E6] hover:border-[#5CE1E6] flex items-center gap-1"
                        >
                          <Icon name="download" size={12} /> {t.aktuellLaden}
                        </button>
                        <button
                          onClick={importConfig}
                          disabled={!jsonDraft}
                          className="text-xs px-2 py-1 border border-[#5CE1E6] text-black bg-[#5CE1E6] disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1 font-semibold"
                        >
                          <Icon name="upload" size={12} /> {t.importieren}
                        </button>
                      </div>
                    </div>
                    <textarea
                      value={jsonDraft}
                      onChange={(e) => { setJsonDraft(e.target.value); setJsonError(""); setJsonSuccess(""); }}
                      placeholder={t.jsonPlaceholder}
                      className="w-full h-64 p-2 bg-[#0a0a0a] border border-gray-700 text-gray-300 text-xs font-mono outline-none focus:border-[#5CE1E6] resize-none"
                    />
                    {jsonError && <p className="text-xs text-red-400 mt-2">{jsonError}</p>}
                    {jsonSuccess && <p className="text-xs text-green-400 mt-2">{jsonSuccess}</p>}
                    <p className="text-[10px] text-gray-600 mt-2 font-mono">
                      {config.meta?.stand || "—"} · {Object.keys(config.models).length} {t.modelleAktiv}
                    </p>
                  </div>

                  {/* Country Factors */}
                  <div className="bg-black border border-gray-800 p-4">
                    <p className="text-sm font-semibold text-white mb-3">{t.laenderfaktoren}</p>
                    <table className="w-full">
                      <thead>
                        <tr>
                          <th className="text-[10px] text-gray-500 uppercase text-left pb-1">{t.land}</th>
                          <th className="text-[10px] text-gray-500 uppercase text-right pb-1">{lang === "it" ? "Fattore" : lang === "en" ? "Factor" : "Faktor"}</th>
                        </tr>
                      </thead>
                      <tbody>
                        {Object.entries(countryFactors).map(([code, val]) => (
                          <tr key={code} className="border-t border-gray-800">
                            <td className="py-2 text-xs text-gray-400">{code}</td>
                            <td className="py-2 text-right">
                              <input
                                type="number" step="0.01"
                                className="w-24 p-1 bg-black border border-gray-700 text-[#5CE1E6] text-xs text-right focus:border-[#5CE1E6] outline-none"
                                value={val}
                                onChange={(e) => setCountryFactors({
                                  ...countryFactors,
                                  [code]: parseFloat(e.target.value) || 0
                                })}
                              />
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <p className="text-[10px] text-gray-600 mt-3 font-mono">
                      {t.laenderfaktorenSub}
                    </p>
                  </div>
                </div>

                {/* Modell-Statistik (aktuelle Auswahl) */}
                {currentModel && (
                  <div className="mt-4 bg-black border border-gray-800 p-4">
                    <p className="text-sm font-semibold text-white mb-3">
                      {t.aktuellesModell} <span className="text-[#5CE1E6]">{result.systemDisplay}</span>
                    </p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs font-mono">
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.modelltyp}</span>
                        <span className="text-gray-300">{currentModel.type}</span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.windRange}</span>
                        <span className="text-gray-300">
                          {currentModel.wind_range ? `[${currentModel.wind_range[0]}, ${currentModel.wind_range[1]}]` : "—"}
                        </span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.snowRange}</span>
                        <span className="text-gray-300">
                          {currentModel.snow_range ? `[${currentModel.snow_range[0]}, ${currentModel.snow_range[1]}]` : t.fixSnow}
                        </span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">R²</span>
                        <span className="text-gray-300">
                          {currentModel.r_squared ?? currentModel.wind_r_squared ?? "—"}
                        </span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.anfrageWind}</span>
                        <span className="text-gray-300">
                          {currentModel.wind_anfrage_threshold != null ? `≥ ${currentModel.wind_anfrage_threshold}` : "—"}
                        </span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.anfrageSchnee}</span>
                        <span className="text-gray-300">
                          {currentModel.snow_anfrage_threshold != null ? `≥ ${currentModel.snow_anfrage_threshold}` : "—"}
                        </span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">RMSE</span>
                        <span className="text-gray-300">{currentModel.rmse ?? "—"}</span>
                      </div>
                      <div className="flex flex-col">
                        <span className="text-gray-500">{t.datenpunkte}</span>
                        <span className="text-gray-300">{currentModel.n_data_points ?? "—"}</span>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>
          )}

          <main className="max-w-6xl mx-auto mt-8 px-4 sm:px-8 grid grid-cols-1 md:grid-cols-12 gap-8">
            {/* ---------------- Input ---------------- */}
            <div className="md:col-span-7 space-y-6">
              {/* System Auswahl */}
              <div className="bg-[#111111] p-6 rounded-none border border-gray-800 shadow-lg">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-800 pb-4">
                  <Icon name="layers" size={20} className="text-[#5CE1E6]" /> {t.montagesystem}
                </h2>

                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-gray-300 mb-2">{t.systemKategorie}</label>
                    <select
                      className="w-full p-3 border border-gray-700 rounded-none bg-black text-white focus:ring-1 focus:ring-[#5CE1E6] focus:border-[#5CE1E6] outline-none"
                      value={category}
                      onChange={(e) => setCategory(e.target.value)}
                    >
                      <option value="Flat">{t.flat}</option>
                      <option value="Pitch">{t.pitch}</option>
                      <option value="METAL">{t.metal}</option>
                      <option value="GROUND">{t.ground}</option>
                    </select>
                  </div>

                  <div className="p-4 bg-black/50 border border-gray-800 space-y-4">
                    {category === "Flat" && (
                      <>
                        <div>
                          <label className="block text-xs text-gray-400 mb-1 uppercase tracking-wider">{t.system}</label>
                          <select
                            className="w-full p-2 border border-gray-700 bg-black text-white outline-none focus:border-[#5CE1E6]"
                            value={flatSystem}
                            onChange={(e) => setFlatSystem(e.target.value)}
                          >
                            {flatSystemKeysVisible.map((s) => (
                              <option key={s} value={s}>{s}</option>
                            ))}
                          </select>
                          {hasAlpineVariant(flatSystem) && (
                            <button
                              type="button"
                              role="switch"
                              aria-checked={alpine}
                              onClick={() => setAlpine((a) => !a)}
                              className={`mt-3 group flex items-center justify-between w-full px-3 py-2.5 border transition-all ${
                                alpine
                                  ? "border-[#5CE1E6]/60 bg-[#5CE1E6]/5"
                                  : "border-gray-800 bg-black/40 hover:border-gray-600"
                              }`}
                            >
                              <span className="flex items-center gap-2.5">
                                <Icon
                                  name="mountain-snow"
                                  size={16}
                                  className={alpine ? "text-[#5CE1E6]" : "text-gray-600 group-hover:text-gray-400"}
                                />
                                <span className="flex flex-col items-start">
                                  <span className={`text-xs font-semibold uppercase tracking-wider ${alpine ? "text-white" : "text-gray-400"}`}>
                                    {t.alpineLabel}
                                  </span>
                                  <span className="text-[10px] text-gray-600 normal-case tracking-normal">
                                    {t.alpineSub}
                                  </span>
                                </span>
                              </span>
                              <span
                                className={`relative inline-flex h-5 w-9 flex-shrink-0 border transition-colors ${
                                  alpine ? "bg-[#5CE1E6] border-[#5CE1E6]" : "bg-black border-gray-700"
                                }`}
                              >
                                <span
                                  className={`absolute top-0.5 h-3.5 w-3.5 transition-all ${
                                    alpine ? "left-[18px] bg-black" : "left-0.5 bg-gray-500"
                                  }`}
                                />
                              </span>
                            </button>
                          )}
                        </div>

                        {currentFlatSys && (
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wider">{t.klemmung}</label>
                              {currentFlatSys.klemmungen.length > 1 ? (
                                <Segmented
                                  value={flatKlemmung}
                                  onChange={setFlatKlemmung}
                                  options={["KSK", "LSK"].map(k => ({
                                    value: k,
                                    label: k === "KSK" ? t.ksk : t.lsk,
                                    disabled: !currentFlatSys.klemmungen.includes(k)
                                  }))}
                                />
                              ) : (
                                <div className="px-3 py-2 border border-gray-800 text-gray-500 text-xs uppercase tracking-wider">
                                  {currentFlatSys.klemmungen[0] === "KSK" ? t.ksk : currentFlatSys.klemmungen[0] === "LSK" ? t.lsk : currentFlatSys.klemmungen[0]}
                                </div>
                              )}
                            </div>
                            <div>
                              <label className="block text-xs text-gray-400 mb-2 uppercase tracking-wider">{t.ausrichtung}</label>
                              {currentFlatSys.ausrichtungen.length > 1 ? (
                                <Segmented
                                  value={flatAusrichtung}
                                  onChange={setFlatAusrichtung}
                                  options={["Ost/West", "Süd"].map(a => ({
                                    value: a, label: a === "Ost/West" ? t.ow : t.sued,
                                    disabled: !currentFlatSys.ausrichtungen.includes(a)
                                  }))}
                                />
                              ) : (
                                <div className="px-3 py-2 border border-gray-800 text-gray-500 text-xs uppercase tracking-wider">
                                  {currentFlatSys.ausrichtungen[0] === "Ost/West" ? t.ow : currentFlatSys.ausrichtungen[0] === "Süd" ? t.sued : currentFlatSys.ausrichtungen[0]}
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </>
                    )}

                    {category === "Pitch" && (
                      <div>
                        <label className="block text-xs text-gray-400 mb-1 uppercase tracking-wider">{t.system}</label>
                        <select
                          className="w-full p-2 border border-gray-700 bg-black text-white outline-none focus:border-[#5CE1E6]"
                          value={pitchSystem}
                          onChange={(e) => setPitchSystem(e.target.value)}
                        >
                          {idx.pitch.map((p) => (
                            <option key={p.system} value={p.system}>{p.system}</option>
                          ))}
                        </select>
                      </div>
                    )}

                    {(category === "METAL" || category === "GROUND") && (
                      <div className="text-center py-4">
                        <Icon name="info" size={20} className="text-gray-600 mx-auto mb-2" />
                        <p className="text-sm text-gray-400 font-medium">
                          {PLACEHOLDER_CATEGORIES[category].label}
                        </p>
                        <p className="text-xs text-gray-600 mt-1">
                          {t.kostenfunktionenFolgen(PLACEHOLDER_CATEGORIES[category].systems.join(", "))}
                        </p>
                        <p className="text-xs text-[#5CE1E6] mt-2 italic">{t.bitteVertriebAnfragen}</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Standort & Lasten */}
              <div className="bg-[#111111] p-6 rounded-none border border-gray-800 shadow-lg">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-800 pb-4">
                  <Icon name="map-pin" size={20} className="text-[#5CE1E6]" /> {t.standortLasten}
                </h2>

                <div className="space-y-6">
                  <div>
                    <label className="text-sm font-semibold text-gray-300 mb-2 flex items-center gap-2">
                      <Icon name="globe" size={16} className="text-gray-500" /> {t.land}
                    </label>
                    <select
                      className="w-full p-3 border border-gray-700 rounded-none bg-black text-white focus:ring-1 focus:ring-[#5CE1E6] outline-none"
                      value={country}
                      onChange={(e) => setCountry(e.target.value)}
                    >
                      {Object.keys(countryFactors).map((c) => (
                        <option key={c} value={c}>
                          {t.countries[c] || c}
                          {" "}({countryFactors[c].toFixed(2)}×)
                        </option>
                      ))}
                    </select>
                  </div>

                  <div className="space-y-6 border border-gray-800 bg-[#151515] p-5">
                    <div>
                      <label className="text-sm font-semibold text-gray-300 mb-3 flex justify-between items-center">
                        <span className="flex items-center gap-2"><Icon name="wind" size={16} className="text-[#5CE1E6]" /> {t.windlast}</span>
                        <span className="text-[#5CE1E6] font-bold bg-[#5CE1E6]/10 px-2 py-1 rounded-none border border-[#5CE1E6]/30">
                          {windLoad.toFixed(1)} kN/m²
                        </span>
                      </label>
                      <input
                        type="range" min="0.1" max="3" step="0.1"
                        value={windLoad}
                        onChange={(e) => setWindLoad(Number(e.target.value))}
                        className="w-full accent-[#5CE1E6] h-1 bg-gray-700 appearance-none cursor-pointer"
                      />
                      <div className="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                        <span>0.1</span><span>3.0</span>
                      </div>
                    </div>

                    {/* Schneelast: nur PITCH */}
                    {category === "Pitch" && (
                      <div className="pt-2 border-t border-gray-800">
                        <label className="text-sm font-semibold text-gray-300 mb-3 mt-2 flex justify-between items-center">
                          <span className="flex items-center gap-2"><Icon name="snowflake" size={16} className="text-[#5CE1E6]" /> {t.schneelast}</span>
                          <span className="text-[#5CE1E6] font-bold bg-[#5CE1E6]/10 px-2 py-1 rounded-none border border-[#5CE1E6]/30">
                            {snowLoad.toFixed(1)} kN/m²
                          </span>
                        </label>
                        <input
                          type="range" min="0.1" max="4" step="0.1"
                          value={snowLoad}
                          onChange={(e) => setSnowLoad(Number(e.target.value))}
                          className="w-full accent-[#5CE1E6] h-1 bg-gray-700 appearance-none cursor-pointer"
                        />
                        <div className="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                          <span>0.1</span><span>4.0</span>
                        </div>
                      </div>
                    )}

                    {category === "Flat" && (
                      <div className="pt-2 border-t border-gray-800">
                        <p className="text-xs text-gray-500 italic flex items-center gap-2">
                          <Icon name="info" size={12} />
                          {t.flatHinweis}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              </div>

            </div>

            {/* ---------------- Output ---------------- */}
            <div className="md:col-span-5 space-y-6">
              <div className="bg-[#111111] border border-[#5CE1E6]/30 text-white p-6 rounded-none shadow-2xl">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-800 pb-4">
                  <Icon name="calculator" size={20} className="text-[#5CE1E6]" /> {t.output}
                </h2>

                {/* Anfrage / Unbekannt */}
                {(result.status === "anfrage" || result.status === "unbekannt") && (
                  <div className={`p-6 rounded-none border-l-4 ${
                    result.status === "anfrage"
                      ? "bg-[#5CE1E6]/5 border-[#5CE1E6]"
                      : "bg-red-950/30 border-red-500"
                  }`}>
                    <div className="flex items-start gap-3">
                      <Icon
                        name={result.status === "anfrage" ? "phone" : "alert-triangle"}
                        size={24}
                        className={result.status === "anfrage" ? "text-[#5CE1E6]" : "text-red-400"}
                      />
                      <div>
                        <p className="text-lg font-bold">
                          {result.status === "anfrage" ? t.preisAufAnfrage : t.modellNichtVerfuegbar}
                        </p>
                        <p className="text-sm text-gray-400 mt-1">
                          {result.meta?.grund || result.meta?.reason}
                        </p>
                      </div>
                    </div>
                  </div>
                )}

                {/* Normales Ergebnis */}
                {result.preis != null && (
                  <div className="space-y-5">
                    {/* Status Badge */}
                    {result.status === "extrapoliert" && (
                      <div className="bg-yellow-500/10 border border-yellow-500/40 p-3 text-xs">
                        <div className="flex items-start gap-2">
                          <Icon name="alert-triangle" size={14} className="text-yellow-400 mt-0.5" />
                          <div>
                            <p className="text-yellow-300 font-semibold uppercase tracking-wider">{t.extrapoliert}</p>
                            <p className="text-yellow-200/70 mt-1">
                              {result.meta?.ausserhalb?.join(" · ")}
                            </p>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Hero: €/kWp */}
                    <div className="bg-black p-5 rounded-none border-l-4 border-[#5CE1E6]">
                      <p className="text-gray-400 text-sm uppercase tracking-wider font-semibold mb-1">{t.kostenProKwp}</p>
                      <div className="flex justify-between items-end">
                        <span className="text-4xl font-light text-[#5CE1E6]">€ {fmtEur(result.pricePerKwp)}</span>
                        <span className="text-sm text-gray-500">/ kWp</span>
                      </div>
                    </div>

                    {/* Gesamtkosten */}
                    <div className="p-5 bg-black border border-[#5CE1E6]/40">
                      <p className="text-gray-400 text-sm mb-1 uppercase tracking-wider font-semibold">
                        {t.gesamtkostenBei} {fmtNum(result.totalKwp)} kWp
                      </p>
                      <div className="flex justify-between items-end">
                        <span className="text-3xl font-light text-white">€ {fmtEur(result.totalCost)}</span>
                        <span className="text-sm text-gray-500">{moduleCount} {t.moduleLabel}</span>
                      </div>
                    </div>

                    {/* €/Modul (abgeleitet) */}
                    <div className="p-4 bg-black/50 border border-gray-800">
                      <div className="flex justify-between items-center">
                        <p className="text-gray-400 text-xs uppercase tracking-wider font-semibold">{t.kostenProModul}</p>
                        <span className="text-lg font-light text-gray-300">€ {fmtEur(result.pricePerModule)}</span>
                      </div>
                    </div>

                    {/* Aufschlüsselung (nur wenn Multiplikatoren ≠ 1) */}
                    {(result.countryFactor !== 1 || result.discountFactor !== 1) && (
                      <div className="p-3 bg-black/30 border border-dashed border-gray-800 text-[11px] font-mono space-y-1">
                        <div className="flex justify-between text-gray-500">
                          <span>{t.modellpreis}</span>
                          <span className="text-gray-300">€ {fmtEur(result.basePricePerKwp)} /kWp</span>
                        </div>
                        {result.countryFactor !== 1 && (
                          <div className="flex justify-between text-gray-500">
                            <span>{t.laenderfaktor} {country}:</span>
                            <span className="text-gray-300">{result.countryFactor.toFixed(2)}</span>
                          </div>
                        )}
                        {result.discountFactor !== 1 && (
                          <div className="flex justify-between text-gray-500">
                            <span>{t.rabattLine}</span>
                            <span className="text-gray-300">{discount}%</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* Disclaimer */}
                <div className="mt-8 pt-6 border-t border-gray-800">
                  <p className="text-xs text-gray-500 font-bold uppercase mb-1">{t.disclaimerTitle}</p>
                  <p className="text-xs text-gray-600 leading-relaxed">
                    {t.disclaimerBody} {config.meta?.stand || "—"}.
                  </p>
                </div>
              </div>

              {/* Modul & Konditionen */}
              <div className="bg-[#111111] p-6 rounded-none border border-gray-800 shadow-lg">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-800 pb-4">
                  <Icon name="sun" size={20} className="text-[#5CE1E6]" /> {t.modulKonditionen}
                </h2>
                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-gray-300 mb-2">{t.leistung}</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Icon name="zap" size={16} className="text-gray-500" />
                      </div>
                      <input
                        type="number"
                        className="w-full pl-10 p-3 border border-gray-700 rounded-none bg-black text-white focus:ring-1 focus:ring-[#5CE1E6] outline-none"
                        value={modulePower}
                        onChange={(e) => setModulePower(Number(e.target.value))}
                      />
                    </div>
                    <p className="text-[10px] text-gray-600 mt-1 font-mono">
                      {t.referenzmodul}: {config.meta?.modul || "—"}
                    </p>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-300 mb-2">{t.anzahlModule}</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Icon name="layers" size={16} className="text-gray-500" />
                      </div>
                      <input
                        type="number"
                        className="w-full pl-10 p-3 border border-gray-700 rounded-none bg-black text-white focus:ring-1 focus:ring-[#5CE1E6] outline-none"
                        value={moduleCount}
                        onChange={(e) => setModuleCount(Number(e.target.value))}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-300 mb-2">{t.rabatt}</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Icon name="tag" size={16} className="text-gray-500" />
                      </div>
                      <input
                        type="number" min="0" max="100"
                        className="w-full pl-10 p-3 border border-gray-700 rounded-none bg-black text-[#5CE1E6] font-bold focus:ring-1 focus:ring-[#5CE1E6] outline-none"
                        value={discount}
                        onChange={(e) => setDiscount(Number(e.target.value))}
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AerocompactCalculator />);
  </script>
</body>
</html>
