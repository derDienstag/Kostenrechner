<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEROCOMPACT Richtpreis-Rechner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      /* surfaces */
      --bg:        oklch(8.5% 0.008 200);
      --bg2:       oklch(12%  0.008 200);
      --surface:   oklch(15%  0.008 200);
      --surface2:  oklch(19%  0.008 200);
      /* borders */
      --border:    oklch(22%  0.006 200);
      --border2:   oklch(32%  0.006 200);
      /* text */
      --text:      oklch(93%  0.004 200);
      --text2:     oklch(74%  0.004 200);
      --text3:     oklch(57%  0.005 200);
      /* accent */
      --cyan:      oklch(78%  0.13  195);
      --cyan-mid:  oklch(78%  0.13  195 / 0.18);
      --cyan-dim:  oklch(78%  0.13  195 / 0.09);
      /* semantic */
      --amber:     oklch(74%  0.14   72);
      --amber-dim: oklch(74%  0.14   72 / 0.10);
      --err:       oklch(65%  0.16   20);
      --err-dim:   oklch(65%  0.16   20 / 0.10);
      /* type */
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
      /* geometry */
      --rad:    10px;
      --rad-sm:  6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body, #root {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Header ─────────────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .hdr-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Lang ───────────────────────────────────────────────────── */
    .lang-btn {
      padding: 4px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: 1px solid transparent; cursor: pointer;
      background: transparent; font-family: var(--sans);
      color: var(--text3); transition: all 0.12s;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--border); }
    .lang-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rad);
    }

    /* ── Section header ─────────────────────────────────────────── */
    .sec-hdr {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text3);
    }

    /* ── Category tabs ──────────────────────────────────────────── */
    .cat-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--rad-sm);
      overflow: hidden;
      background: var(--bg2);
      margin-bottom: 20px;
    }
    .cat-tab {
      flex: 1; padding: 9px 6px;
      border: none; background: transparent;
      font-family: var(--sans);
      cursor: pointer; transition: background 0.12s, color 0.12s;
      text-align: center; display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      border-right: 1px solid var(--border);
    }
    .cat-tab:last-child { border-right: none; }
    .cat-tab:hover:not(.cat-tab-active) { background: var(--surface); }
    .cat-tab-active { background: var(--surface); }
    .cat-tab-name {
      font-size: 12px; font-weight: 600; white-space: nowrap;
      color: var(--text2);
    }
    .cat-tab-active .cat-tab-name { color: var(--cyan); }
    .cat-tab-sub { font-size: 10px; color: var(--text3); white-space: nowrap; }
    .cat-req-dot {
      display: inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--amber); margin-left: 4px;
      vertical-align: middle; position: relative; top: -1px;
    }

    /* ── Chips ──────────────────────────────────────────────────── */
    .chip {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: var(--rad-sm);
      background: transparent; color: var(--text2);
      font-family: var(--sans); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.12s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .chip.active { border-color: var(--cyan); background: var(--cyan-dim); color: var(--cyan); font-weight: 600; }
    .chip:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Inputs ─────────────────────────────────────────────────── */
    .inp {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--rad-sm); padding: 9px 12px;
      color: var(--text); font-family: var(--sans); font-size: 13px;
      width: 100%; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none; appearance: none;
    }
    .inp:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px var(--cyan-dim); }
    select.inp { cursor: pointer; }
    select.inp option { background: oklch(12% 0.008 200); }

    .num-inp {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--rad-sm); padding: 9px 12px;
      color: var(--text); font-family: var(--mono); font-size: 14px;
      width: 100%; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .num-inp:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px var(--cyan-dim); }

    /* ── Segmented ──────────────────────────────────────────────── */
    .seg {
      display: flex; border: 1px solid var(--border);
      border-radius: var(--rad-sm); overflow: hidden; background: var(--bg2);
    }
    .seg-btn {
      flex: 1; padding: 8px 10px; border: none; background: transparent;
      color: var(--text2); font-family: var(--sans);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      cursor: pointer; transition: all 0.12s;
    }
    .seg-btn + .seg-btn { border-left: 1px solid var(--border); }
    .seg-btn:hover:not(:disabled) { color: var(--text); background: var(--surface); }
    .seg-btn.active { background: var(--surface2); color: var(--text); }
    .seg-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── Slider ─────────────────────────────────────────────────── */
    .slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px; border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--cyan);
      cursor: pointer; transition: transform 0.12s;
    }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider::-webkit-slider-thumb:active { transform: scale(1.05); }
    .slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--cyan); cursor: pointer;
    }

    /* ── Toggle ─────────────────────────────────────────────────── */
    .toggle-wrap {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--rad-sm); cursor: pointer; transition: all 0.15s;
      background: transparent;
    }
    .toggle-wrap:hover { border-color: var(--border2); }
    .toggle-wrap.on { border-color: oklch(78% 0.13 195 / 0.4); background: var(--cyan-dim); }
    .toggle-track {
      width: 34px; height: 18px; border-radius: 9px;
      transition: background 0.15s; position: relative; flex-shrink: 0;
    }
    .toggle-thumb {
      position: absolute; top: 2px; width: 14px; height: 14px;
      border-radius: 50%; transition: left 0.15s;
    }

    /* ── Label ──────────────────────────────────────────────────── */
    .lbl {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3);
    }

    /* ── Badges ─────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .badge-warn { background: var(--amber-dim); color: var(--amber); border: 1px solid oklch(74% 0.14 72 / 0.25); }
    .badge-ok   { background: var(--cyan-dim);  color: var(--cyan);  border: 1px solid oklch(78% 0.13 195 / 0.2); }
    .badge-err  { background: var(--err-dim);   color: var(--err);   border: 1px solid oklch(65% 0.16 20 / 0.25); }

    /* ── Buttons ────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: var(--rad-sm);
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      cursor: pointer; transition: all 0.12s; border: 1px solid transparent;
    }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .btn-primary { background: var(--cyan); color: oklch(12% 0.008 200); border-color: var(--cyan); }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-danger { background: transparent; border-color: oklch(65% 0.16 20 / 0.3); color: var(--err); }
    .btn-danger:hover { background: var(--err-dim); }

    /* ── Breakdown rows ─────────────────────────────────────────── */
    .bk-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; font-size: 11px; font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .bk-row + .bk-row { border-top: 1px solid var(--border); }

    /* ── Textarea ───────────────────────────────────────────────── */
    textarea {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--rad-sm); padding: 11px 12px;
      color: var(--text); font-family: var(--mono); font-size: 11px;
      width: 100%; outline: none; resize: none;
      transition: border-color 0.15s; line-height: 1.6;
    }
    textarea:focus { border-color: var(--cyan); }
    textarea::-webkit-scrollbar { width: 5px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Icon helper ────────────────────────────────────────────── */
    .ico { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.22s ease forwards; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 800px) {
      /* Layout */
      .main-cols {
        flex-direction: column !important;
        align-items: stretch !important; /* children fill full width */
      }
      .left-col  { border-right: none !important; padding-right: 0 !important; flex: none !important; }
      .right-col { position: static !important; padding-left: 0 !important; flex: none !important; }

      /* Spacing */
      .hdr-inner { padding-left: 16px !important; padding-right: 16px !important; }
      .main-inner { padding: 20px 16px 48px !important; }

      /* Header: hide subtitle, compress lang buttons */
      .hdr-title { display: none !important; }
      .hdr-divider { display: none !important; }
      .lang-btn { padding: 4px 6px !important; }

      /* Category tabs: 2×2 grid */
      .cat-tabs  { flex-wrap: wrap; }
      .cat-tab   { flex: 1 1 45%; min-width: 0; border-bottom: 1px solid var(--border); }

      /* Module grid: 2 columns instead of 3, last item full width */
      .module-grid { grid-template-columns: 1fr 1fr !important; }
      .module-grid > *:last-child { grid-column: 1 / -1; }

      /* Chips: allow horizontal scroll on very small screens */
      .chip-row { overflow-x: auto; flex-wrap: nowrap !important; padding-bottom: 4px; }
      .chip-row::-webkit-scrollbar { height: 3px; }
      .chip-row::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    }
  </style>
</head>

  // ── MATH ───────────────────────────────────────────────────────
  function evalPoly(coef, x) { let y=0; for(const c of coef) y=y*x+c; return y; }
  function makeKey(kat, sys, aus, klem) {
    if(kat==="Pitch"||kat==="Metal") return `${kat}|${sys}|—|—`;
    return `Flat|${sys}|${aus}|${klem}`;
  }

  function richtpreisProKwp({ kategorie, system, ausrichtung, klemmung, schnee, wind, config, t }) {
    if(kategorie==="GROUND") return { preis:null, status:"anfrage", meta:{ reason: t?.datenInAktualisierung||"Daten in Aktualisierung" } };
    const key=makeKey(kategorie,system,ausrichtung,klemmung);
    const m=config.models[key];
    if(!m) return { preis:null, status:"unbekannt", meta:{ key, reason:"—" } };
    if(m.type==="no_data") return { preis:null, status:"anfrage", meta:{ key, grund: t?.bitteVertriebAnfragen||"Anfrage erforderlich" } };
    if(m.wind_anfrage_threshold!=null && wind>=m.wind_anfrage_threshold) return { preis:null, status:"anfrage", meta:{ key, grund:`${t?.windlast||"Wind"} ≥ ${m.wind_anfrage_threshold} kN/m²` } };
    if(m.snow_anfrage_threshold!=null && schnee>=m.snow_anfrage_threshold) return { preis:null, status:"anfrage", meta:{ key, grund:`${t?.schneelast||"Schnee"} ≥ ${m.snow_anfrage_threshold} kN/m²` } };
    let preis;
    if(m.type==="constant") preis=m.value;
    else if(m.type==="poly_wind") preis=evalPoly(m.wind_coef,wind);
    else if(m.type==="separable_2d") preis=m.base+evalPoly(m.wind_coef,wind)+evalPoly(m.snow_coef,schnee);
    else return { preis:null, status:"unbekannt", meta:{ key } };
    let status="ok"; const ausserhalb=[];
    if(m.wind_range&&(wind<m.wind_range[0]||wind>m.wind_range[1])) ausserhalb.push(`${t?.windlast||"Wind"} ${wind.toFixed(1)} ∉ [${m.wind_range[0]}, ${m.wind_range[1]}]`);
    if(m.snow_range&&(schnee<m.snow_range[0]||schnee>m.snow_range[1])) ausserhalb.push(`${t?.schneelast||"Schnee"} ${schnee.toFixed(1)} ∉ [${m.snow_range[0]}, ${m.snow_range[1]}]`);
    if(ausserhalb.length) status="extrapoliert";
    return { preis:Math.round(preis*100)/100, status, meta:{ key, ausserhalb, model:m.type, m } };
  }

  function indexConfig(config) {
    const flat={}, pitch=[], metal=[];
    for(const [key,m] of Object.entries(config.models)) {
      if(m.kategorie==="Flat") {
        if(!flat[m.system]) flat[m.system]={ system:m.system, variants:[] };
        flat[m.system].variants.push({ key, klemmung:m.klemmung, ausrichtung:m.ausrichtung });
      } else if(m.kategorie==="Pitch") pitch.push({ key, system:m.system });
      else if(m.kategorie==="Metal") metal.push({ key, system:m.system });
    }
    for(const sys of Object.values(flat)) {
      sys.klemmungen=[...new Set(sys.variants.map(v=>v.klemmung))];
      sys.ausrichtungen=[...new Set(sys.variants.map(v=>v.ausrichtung))];
    }
    return { flat, pitch, metal };
  }

  // ── ANIMATED NUMBER ────────────────────────────────────────────
  function useAnimatedNumber(target, duration=350) {
    const [display, setDisplay] = useState(target);
    const animRef = useRef(null);
    const prevRef = useRef(target);
    useEffect(() => {
      const start=prevRef.current, end=target, t0=performance.now();
      if(animRef.current) cancelAnimationFrame(animRef.current);
      function step(now) {
        const p=Math.min((now-t0)/duration,1);
        const e=1-Math.pow(1-p,3);
        setDisplay(start+(end-start)*e);
        if(p<1) animRef.current=requestAnimationFrame(step);
        else prevRef.current=end;
      }
      animRef.current=requestAnimationFrame(step);
      return ()=>cancelAnimationFrame(animRef.current);
    }, [target]);
    return display;
  }

    const [jsonDraft,setJsonDraft]=useState(""); const [jsonError,setJsonError]=useState(""); const [jsonSuccess,setJsonSuccess]=useState("");
    const exportConfig=()=>{ setJsonDraft(JSON.stringify(config,null,2)); setJsonError(""); setJsonSuccess(""); };
    const importConfig=()=>{ try{ const p=JSON.parse(jsonDraft); if(!p.models||typeof p.models!=="object") throw new Error(t.expectModels); setConfig(p); setJsonError(""); setJsonSuccess(t.modelleImportiert(Object.keys(p.models).length)); }catch(err){ setJsonError(t.jsonError+" "+err.message); setJsonSuccess(""); } };

    const currentFlatSys=idx.flat[flatSystem];
    const currentModel=result.meta?.m;

    const CATS = [
      { id:"Flat",   label:t.flat,   sub:t.flatSub,   req:false },
      { id:"Pitch",  label:t.pitch,  sub:t.pitchSub,  req:false },
      { id:"Metal",  label:t.metal,  sub:t.metalSub,  req:false },
      { id:"GROUND", label:t.ground, sub:t.groundSub, req:true  },
    ];

    return (
      <div style={{ minHeight:'100vh' }}>

        {/* ── HEADER ── */}
        <header className="hdr">
          <div className="hdr-inner">
            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
              <img src="logo.png" alt="AEROCOMPACT" style={{ height:20, filter:'invert(1) brightness(1.1)' }}/>
              <div className="hdr-divider" style={{ width:1, height:18, background:'var(--border)' }}/>
              <span className="hdr-title" style={{ fontSize:10, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text3)' }}>{t.title}</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              {["de","en","it"].map(code=>(
                <button key={code} className={`lang-btn${lang===code?' active':''}`} onClick={()=>setLang(code)}>{code}</button>
              ))}
              {isAdmin && (<>
                <div style={{ width:1, height:16, background:'var(--border)', margin:'0 2px' }}/>
                <button className="btn btn-ghost" onClick={()=>setShowBackend(s=>!s)}
                  style={{ padding:'5px 10px', fontSize:10, gap:4, background:showBackend?'var(--surface2)':undefined, borderColor:showBackend?'var(--border2)':undefined }}>
                  <Icon name="settings" size={12}/> {t.backend}
                </button>
                <button className="btn btn-ghost" onClick={doLogout} style={{ padding:'5px 8px' }} title="Logout">
                  <Icon name="log-out" size={12}/>
                </button>
              </>)}
            </div>
          </div>
        </header>

        {/* ── BACKEND ── */}
        {isAdmin && showBackend && (
          <section style={{ borderBottom:'1px solid var(--border)', background:'var(--bg2)', padding:'24px 32px' }}>
            <div style={{ maxWidth:1200, margin:'0 auto' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
                <div className="sec-hdr">
                  <Icon name="database" size={13} style={{ color:'var(--text3)' }}/>
                  {t.backendTitle}
                </div>
                <button className="btn btn-ghost" onClick={resetAll} style={{ fontSize:10, gap:4 }}>
                  <Icon name="rotate-ccw" size={11}/> {t.zuruecksetzen}
                </button>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
                <div className="card" style={{ padding:20 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
                    <span style={{ fontSize:11, fontWeight:600, color:'var(--text2)' }}>{t.modellKonfig}</span>
                    <div style={{ display:'flex', gap:6 }}>
                      <button className="btn btn-ghost" onClick={exportConfig} style={{ fontSize:10, padding:'4px 9px', gap:3 }}><Icon name="download" size={11}/> {t.aktuellLaden}</button>
                      <button className="btn btn-primary" onClick={importConfig} disabled={!jsonDraft} style={{ fontSize:10, padding:'4px 9px', gap:3 }}><Icon name="upload" size={11}/> {t.importieren}</button>
                    </div>
                  </div>
                  <textarea value={jsonDraft} onChange={e=>{setJsonDraft(e.target.value);setJsonError("");setJsonSuccess("");}} placeholder={t.jsonPlaceholder} style={{ height:150 }}/>
                  {jsonError && <p style={{ color:'var(--err)', fontSize:11, marginTop:6 }}>{jsonError}</p>}
                  {jsonSuccess && <p style={{ color:'oklch(70% 0.15 145)', fontSize:11, marginTop:6 }}>{jsonSuccess}</p>}
                  <p style={{ fontSize:10, color:'var(--text3)', fontFamily:'var(--mono)', marginTop:8 }}>{config.meta?.stand||"—"} · {Object.keys(config.models).length} {t.modelleAktiv}</p>
                </div>
                <div className="card" style={{ padding:20 }}>
                  <p style={{ fontSize:11, fontWeight:600, color:'var(--text2)', marginBottom:14 }}>{t.laenderfaktoren}</p>
                  <table style={{ width:'100%', borderCollapse:'collapse' }}>
                    <thead><tr>
                      <th style={{ fontSize:10, color:'var(--text3)', textAlign:'left', paddingBottom:8, textTransform:'uppercase', letterSpacing:'0.08em' }}>{t.land}</th>
                      <th style={{ fontSize:10, color:'var(--text3)', textAlign:'right', paddingBottom:8, textTransform:'uppercase', letterSpacing:'0.08em' }}>Faktor</th>
                    </tr></thead>
                    <tbody>{Object.entries(countryFactors).map(([code,val])=>(
                      <tr key={code} style={{ borderTop:'1px solid var(--border)' }}>
                        <td style={{ padding:'7px 0', fontSize:12, color:'var(--text2)' }}>{code}</td>
                        <td style={{ padding:'7px 0', textAlign:'right' }}>
                          <input type="number" step="0.01" className="num-inp" style={{ width:80, fontSize:13 }} value={val} onChange={e=>setCountryFactors({...countryFactors,[code]:parseFloat(e.target.value)||0})}/>
                        </td>
                      </tr>
                    ))}</tbody>
                  </table>
                  <p style={{ fontSize:10, color:'var(--text3)', marginTop:10, fontFamily:'var(--mono)' }}>{t.laenderfaktorenSub}</p>
                </div>
              </div>
              {currentModel && (
                <div className="card" style={{ padding:20, marginTop:14 }}>
                  <p style={{ fontSize:11, fontWeight:600, color:'var(--text2)', marginBottom:12 }}>
                    {t.aktuellesModell} <span style={{ color:'var(--cyan)', fontFamily:'var(--mono)' }}>{result.systemDisplay}</span>
                  </p>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
                    {[
                      [t.modelltyp, currentModel.type],
                      [t.windRange, currentModel.wind_range?`[${currentModel.wind_range}]`:"—"],
                      [t.snowRange, currentModel.snow_range?`[${currentModel.snow_range}]`:t.fixSnow],
                      ["R²", currentModel.r_squared??currentModel.wind_r_squared??"—"],
                      [t.anfrageWind, currentModel.wind_anfrage_threshold!=null?`≥ ${currentModel.wind_anfrage_threshold}`:"—"],
                      [t.anfrageSchnee, currentModel.snow_anfrage_threshold!=null?`≥ ${currentModel.snow_anfrage_threshold}`:"—"],
                      ["RMSE", currentModel.rmse??"—"],
                      [t.datenpunkte, currentModel.n_data_points??"—"],
                    ].map(([k,v])=>(
                      <div key={k}>
                        <div style={{ fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:3 }}>{k}</div>
                        <div style={{ fontSize:12, color:'var(--text2)', fontFamily:'var(--mono)' }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </section>
        )}

        {/* ── MAIN ── */}
        <div className="main-inner" style={{ maxWidth:1200, margin:'0 auto', padding:'36px 32px 80px' }}>
          <div className="main-cols" style={{ display:'flex', alignItems:'flex-start', gap:0 }}>

            {/* ── LEFT COL ── */}
            <div className="left-col" style={{ flex:'0 0 57%', paddingRight:36, borderRight:'1px solid var(--border)' }}>
              <div className="card">

                {/* Section 1: Mounting System */}
                <div style={{ padding:'24px 24px 20px' }}>
                  <div className="sec-hdr" style={{ marginBottom:16 }}>
                    <Icon name="layers" size={13} style={{ color:'var(--text3)' }}/>
                    {t.montagesystem}
                  </div>

                  {/* Category tabs */}
                  <div className="cat-tabs">
                    {CATS.map(cat=>(
                      <button key={cat.id} className={`cat-tab${category===cat.id?' cat-tab-active':''}`} onClick={()=>setCategory(cat.id)}>
                        <span className="cat-tab-name">
                          {cat.label}
                          {cat.req && <span className="cat-req-dot"/>}
                        </span>
                        <span className="cat-tab-sub">{cat.sub}</span>
                      </button>
                    ))}
                  </div>

                  {/* Flat detail */}
                  {category==="Flat" && (
                    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:16 }}>
                      <div>
                        <div className="lbl" style={{ marginBottom:10 }}>{t.system}</div>
                        <div className="chip-row" style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
                          {flatSystemKeysVisible.map(s=>(
                            <button key={s} className={`chip${flatSystem===s?' active':''}`} onClick={()=>setFlatSystem(s)}>{s}</button>
                          ))}
                        </div>
                      </div>
                      {hasAlpineVariant(flatSystem) && (
                        <div className={`toggle-wrap${alpine?' on':''}`} onClick={()=>setAlpine(a=>!a)}>
                          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                            <Icon name="mountain-snow" size={14} style={{ color:alpine?'var(--cyan)':'var(--text3)' }}/>
                            <div>
                              <div style={{ fontSize:13, fontWeight:600, color:alpine?'var(--text)':'var(--text2)' }}>{t.alpineLabel}</div>
                              <div style={{ fontSize:11, color:'var(--text3)' }}>{t.alpineSub}</div>
                            </div>
                          </div>
                          <div className="toggle-track" style={{ background:alpine?'var(--cyan)':'var(--border2)' }}>
                            <div className="toggle-thumb" style={{ left:alpine?'18px':'2px', background:alpine?'oklch(12% 0.008 200)':'var(--text3)' }}/>
                          </div>
                        </div>
                      )}
                      {currentFlatSys && (
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                          <div>
                            <div className="lbl" style={{ marginBottom:8 }}>{t.klemmung}</div>
                            {currentFlatSys.klemmungen.length>1
                              ? <Segmented value={flatKlemmung} onChange={setFlatKlemmung} options={["KSK","LSK"].map(k=>({ value:k, label:k==="KSK"?t.ksk:t.lsk, disabled:!currentFlatSys.klemmungen.includes(k) }))}/>
                              : <div style={{ padding:'8px 11px', border:'1px solid var(--border)', borderRadius:'var(--rad-sm)', fontSize:12, color:'var(--text2)' }}>{currentFlatSys.klemmungen[0]==="KSK"?t.ksk:currentFlatSys.klemmungen[0]==="LSK"?t.lsk:currentFlatSys.klemmungen[0]}</div>
                            }
                          </div>
                          <div>
                            <div className="lbl" style={{ marginBottom:8 }}>{t.ausrichtung}</div>
                            {currentFlatSys.ausrichtungen.length>1
                              ? <Segmented value={flatAusrichtung} onChange={setFlatAusrichtung} options={["Ost/West","Süd"].map(a=>({ value:a, label:a==="Ost/West"?t.ow:t.sued, disabled:!currentFlatSys.ausrichtungen.includes(a) }))}/>
                              : <div style={{ padding:'8px 11px', border:'1px solid var(--border)', borderRadius:'var(--rad-sm)', fontSize:12, color:'var(--text2)' }}>{currentFlatSys.ausrichtungen[0]==="Ost/West"?t.ow:currentFlatSys.ausrichtungen[0]==="Süd"?t.sued:currentFlatSys.ausrichtungen[0]}</div>
                            }
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Pitch detail */}
                  {category==="Pitch" && (
                    <div className="fade-up">
                      <div className="lbl" style={{ marginBottom:10 }}>{t.system}</div>
                      <div className="chip-row" style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
                        {idx.pitch.map(p=>(
                          <button key={p.system} className={`chip${pitchSystem===p.system?' active':''}`} onClick={()=>setPitchSystem(p.system)}>{t.systemLabels?.[p.system]||p.system}</button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Metal detail */}
                  {category==="Metal" && (
                    <div className="fade-up">
                      <div className="lbl" style={{ marginBottom:10 }}>{t.system}</div>
                      <div className="chip-row" style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
                        {idx.metal.map(m=>(
                          <button key={m.system} className={`chip${metalSystem===m.system?' active':''}`} onClick={()=>setMetalSystem(m.system)}>{m.system}</button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Anfrage placeholder */}
                  {category==="GROUND" && (
                    <div className="fade-up" style={{ paddingTop:2 }}>
                      <p style={{ fontSize:13, fontWeight:600, color:'var(--text2)', marginBottom:5 }}>{PLACEHOLDER_CATEGORIES[category].label}</p>
                      <p style={{ fontSize:12, color:'var(--text3)', marginBottom:10, lineHeight:1.5 }}>{t.kostenfunktionenFolgen(PLACEHOLDER_CATEGORIES[category].systems.join(", "))}</p>
                      <span className="badge badge-warn"><Icon name="mail" size={10}/> {t.bitteVertriebAnfragen}</span>
                    </div>
                  )}
                </div>

                {/* Section 2: Location & Loads */}
                <div style={{ padding:'20px 24px', borderTop:'1px solid var(--border)' }}>
                  <div className="sec-hdr" style={{ marginBottom:18 }}>
                    <Icon name="map-pin" size={13} style={{ color:'var(--text3)' }}/>
                    {t.standortLasten}
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
                    <div>
                      <div className="lbl" style={{ marginBottom:7 }}>{t.land}</div>
                      <select className="inp" value={country} onChange={e=>setCountry(e.target.value)}>
                        {Object.keys(countryFactors).map(c=>(
                          <option key={c} value={c}>{t.countries[c]||c}</option>
                        ))}
                      </select>
                    </div>
                    <SliderField label={t.windlast} value={windLoad} min={0.1} max={3} step={0.1} onChange={setWindLoad} unit="kN/m²" iconName="wind"/>
                    {(category==="Pitch"||category==="Metal") && (
                      <SliderField label={t.schneelast} value={snowLoad} min={0.1} max={4} step={0.1} onChange={setSnowLoad} unit="kN/m²" iconName="snowflake"/>
                    )}
                    {category==="Flat" && (
                      <div style={{ display:'flex', alignItems:'flex-start', gap:7, padding:'9px 11px', borderRadius:'var(--rad-sm)', background:'var(--bg2)', border:'1px solid var(--border)' }}>
                        <Icon name="info" size={12} style={{ color:'var(--text3)', flexShrink:0, marginTop:1 }}/>
                        <span style={{ fontSize:12, color:'var(--text3)', fontStyle:'italic', lineHeight:1.5 }}>{t.flatHinweis}</span>
                      </div>
                    )}
                  </div>
                </div>

                {/* Section 3: Module & Terms */}
                <div style={{ padding:'20px 24px 24px', borderTop:'1px solid var(--border)' }}>
                  <div className="sec-hdr" style={{ marginBottom:18 }}>
                    <Icon name="zap" size={13} style={{ color:'var(--text3)' }}/>
                    {t.modulKonditionen}
                  </div>
                  <div className="module-grid" style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14 }}>
                    <div>
                      <div className="lbl" style={{ marginBottom:7 }}>{t.leistung}</div>
                      <input type="number" className="inp num-inp" value={modulePower} onChange={e=>setModulePower(Number(e.target.value))} style={{ textAlign:'left' }}/>
                      <div style={{ fontSize:10, color:'var(--text3)', marginTop:5, fontFamily:'var(--mono)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{config.meta?.modul||"—"}</div>
                    </div>
                    <div>
                      <div className="lbl" style={{ marginBottom:7 }}>{t.anzahlModule}</div>
                      <input type="number" className="inp num-inp" value={moduleCount} onChange={e=>setModuleCount(Number(e.target.value))} style={{ textAlign:'left' }}/>
                      <div style={{ fontSize:10, color:'var(--text3)', marginTop:5, fontFamily:'var(--mono)', fontVariantNumeric:'tabular-nums' }}>{fmt2(result.totalKwp||0)} kWp</div>
                    </div>
                    <div>
                      <div className="lbl" style={{ marginBottom:7 }}>{t.rabatt}</div>
                      <input type="number" min="0" max="100" className="inp num-inp" value={discount} onChange={e=>setDiscount(Number(e.target.value))} style={{ color:discount>0?'var(--cyan)':'var(--text)', textAlign:'left' }}/>
                      <div style={{ fontSize:10, color:'var(--text3)', marginTop:5 }}>&nbsp;</div>
                    </div>
                  </div>
                </div>

              </div>
            </div>

            {/* ── RIGHT COL ── */}
            <div className="right-col" style={{ flex:1, position:'sticky', top:64, paddingLeft:36, display:'flex', flexDirection:'column', gap:14 }}>

              {/* Result card */}
              <div className="card" style={{ borderTop:'2px solid var(--cyan)', borderRadius:'var(--rad)' }}>
                <div style={{ padding:'24px' }}>

                  {/* On-request / unknown state */}
                  {(result.status==="anfrage"||result.status==="unbekannt") && (
                    <div className="fade-up">
                      <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.12em', color:result.status==="anfrage"?'var(--amber)':'var(--err)', marginBottom:12 }}>
                        {result.status==="anfrage" ? t.preisAufAnfrage : t.modellNichtVerfuegbar}
                      </div>
                      {(result.meta?.grund||result.meta?.reason) && (
                        <p style={{ fontSize:12, color:'var(--text2)', fontFamily:'var(--mono)', marginBottom:6 }}>
                          {result.meta?.grund||result.meta?.reason}
                        </p>
                      )}
                      <p style={{ fontSize:12, color:'var(--text3)', fontStyle:'italic', marginBottom:16 }}>{t.bitteVertriebAnfragen}</p>
                      <a href={mailtoAnfrage}
                        style={{ display:'inline-flex', alignItems:'center', gap:7, padding:'9px 16px', borderRadius:'var(--rad-sm)', background:'var(--amber-dim)', border:'1px solid oklch(74% 0.14 72 / 0.35)', color:'var(--amber)', fontFamily:'var(--sans)', fontSize:12, fontWeight:600, textDecoration:'none', cursor:'pointer', transition:'all 0.12s', marginBottom:20 }}
                        onMouseEnter={e=>{e.currentTarget.style.background='oklch(74% 0.14 72 / 0.18)';e.currentTarget.style.borderColor='oklch(74% 0.14 72 / 0.6)';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='var(--amber-dim)';e.currentTarget.style.borderColor='oklch(74% 0.14 72 / 0.35)';}}>
                        <Icon name="mail" size={13}/>
                        {t.anfrageSenden}
                      </a>
                      <div style={{ borderTop:'1px solid var(--border)', paddingTop:16 }}>
                        <div className="lbl" style={{ marginBottom:7 }}>{t.totalKwp}</div>
                        <div style={{ fontFamily:'var(--mono)', fontSize:24, fontWeight:500, color:'var(--text2)', fontVariantNumeric:'tabular-nums' }}>
                          {fmt2(result.totalKwp||0)} kWp
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Normal result */}
                  {result.preis!=null && (
                    <div className="fade-up" style={{ display:'flex', flexDirection:'column', gap:20 }}>
                      {result.status==="extrapoliert" && (
                        <div className="badge badge-warn" style={{ alignSelf:'flex-start' }}>
                          <Icon name="alert-triangle" size={10}/> {t.extrapoliert}
                        </div>
                      )}

                      {/* Primary: €/kWp */}
                      <div>
                        <div className="lbl" style={{ marginBottom:9 }}>{t.kostenProKwp}</div>
                        <div style={{ display:'flex', alignItems:'baseline', gap:7 }}>
                          <span style={{ fontFamily:'var(--mono)', fontSize:48, fontWeight:600, color:'var(--cyan)', lineHeight:1, letterSpacing:'-0.025em', fontVariantNumeric:'tabular-nums' }}>
                            {fmt2(animPriceKwp)}
                          </span>
                          <span style={{ fontSize:13, color:'var(--text3)', fontFamily:'var(--mono)' }}>€/kWp</span>
                        </div>
                      </div>

                      <div style={{ height:1, background:'var(--border)' }}/>

                      {/* Per module */}
                      <div>
                        <div className="lbl" style={{ marginBottom:7 }}>{t.kostenProModul} · {moduleCount} {t.moduleLabel}</div>
                        <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
                          <span style={{ fontFamily:'var(--mono)', fontSize:28, fontWeight:500, color:'var(--text)', lineHeight:1, fontVariantNumeric:'tabular-nums' }}>
                            {fmt2(result.pricePerModule)}
                          </span>
                          <span style={{ fontSize:12, color:'var(--text3)', fontFamily:'var(--mono)' }}>€</span>
                        </div>
                      </div>

                      <div style={{ height:1, background:'var(--border)' }}/>

                      {/* Total */}
                      <div>
                        <div className="lbl" style={{ marginBottom:7 }}>{t.gesamtkosten} · {fmt2(animKwp)} kWp</div>
                        <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
                          <span style={{ fontFamily:'var(--mono)', fontSize:28, fontWeight:500, color:'var(--text)', lineHeight:1, fontVariantNumeric:'tabular-nums' }}>
                            {fmt2(animTotal)}
                          </span>
                          <span style={{ fontSize:12, color:'var(--text3)', fontFamily:'var(--mono)' }}>€</span>
                        </div>
                      </div>

                      {/* Breakdown */}
                      {(result.countryFactor!==1||result.discountFactor!==1) && (
                        <div style={{ borderTop:'1px solid var(--border)', paddingTop:14 }}>
                          <div className="bk-row">
                            <span style={{ color:'var(--text3)' }}>{t.modellpreis}</span>
                            <span style={{ color:'var(--text2)' }}>€ {fmt2(result.basePricePerKwp)}/kWp</span>
                          </div>
                          {result.countryFactor!==1 && (
                            <div className="bk-row">
                              <span style={{ color:'var(--text3)' }}>{t.laenderfaktor} {country}</span>
                              <span style={{ color:'var(--text2)' }}>× {result.countryFactor.toFixed(2)}</span>
                            </div>
                          )}
                          {result.discountFactor!==1 && (
                            <div className="bk-row">
                              <span style={{ color:'var(--text3)' }}>{t.rabattLine}</span>
                              <span style={{ color:'var(--cyan)' }}>−{discount}%</span>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>

              {/* Disclaimer */}
              <div style={{ padding:'12px 14px', borderRadius:'var(--rad-sm)', border:'1px solid var(--border)' }}>
                <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text3)', marginBottom:4 }}>{t.disclaimerTitle}</div>
                <p style={{ fontSize:11, color:'var(--text3)', lineHeight:1.55 }}>{t.disclaimerBody} {config.meta?.stand||"—"}.</p>
              </div>

            </div>
          </div>
        </div>

        {/* ── LOGIN BUTTON ── */}
        {!isAdmin && (
          <button onClick={()=>{setShowLogin(true);setLoginError("");}}
            style={{ position:'fixed', bottom:24, right:24, zIndex:40, width:32, height:32, borderRadius:'50%', border:'1px solid var(--border)', background:'var(--surface)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', opacity:0.3, transition:'opacity 0.2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.3'} title="Admin">
            <Icon name="lock" size={12} style={{ color:'var(--text2)' }}/>
          </button>
        )}

        {/* ── LOGIN MODAL ── */}
        {showLogin && !isAdmin && (
          <div style={{ position:'fixed', inset:0, background:'oklch(0% 0 0 / 0.8)', zIndex:50, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}
            onClick={()=>setShowLogin(false)}>
            <form onSubmit={doLogin} onClick={e=>e.stopPropagation()}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:'var(--rad)', padding:32, width:'100%', maxWidth:340 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20, paddingBottom:16, borderBottom:'1px solid var(--border)' }}>
                <Icon name="lock" size={14} style={{ color:'var(--text3)' }}/>
                <span style={{ fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text2)' }}>{t.adminLogin}</span>
              </div>
              <div className="lbl" style={{ marginBottom:7 }}>{t.passwort}</div>
              <input type="password" autoFocus value={loginPw} onChange={e=>setLoginPw(e.target.value)} className="inp" style={{ marginBottom:loginError?6:0 }}/>
              {loginError && <p style={{ color:'var(--err)', fontSize:12, marginTop:6 }}>{loginError}</p>}
              <div style={{ display:'flex', gap:8, marginTop:18 }}>
                <button type="button" className="btn btn-ghost" style={{ flex:1 }} onClick={()=>{setShowLogin(false);setLoginPw("");setLoginError("");}}>{t.abbrechen}</button>
                <button type="submit" className="btn btn-primary" style={{ flex:1 }}>{t.loginBtn}</button>
              </div>
              <p style={{ fontSize:11, color:'var(--text3)', textAlign:'center', marginTop:12 }}>{t.sessionHinweis}</p>
            </form>
          </div>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<AerocompactCalculator/>);
</script>
</body>
</html>
